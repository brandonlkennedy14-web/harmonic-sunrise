<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Harmonic Winding</title>
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;overflow:hidden;touch-action:manipulation;font-family:'VT323','Courier New',monospace}
canvas{display:block;position:absolute;top:0;left:0;width:100vw;height:100vh;image-rendering:pixelated}
#c-bg{z-index:1}#c-game{z-index:2;background:transparent}#c-munker{z-index:3;pointer-events:none}
#nav{position:absolute;top:0;left:0;width:100%;z-index:100;display:flex;justify-content:center;gap:8px;padding:11px 4px;background:rgba(0,0,0,.92);border-bottom:2px solid #222;pointer-events:auto;flex-wrap:wrap;font-size:12px;letter-spacing:1px;}
#nav a{text-decoration:none;font-weight:bold}#nav span{color:#444}
.hud{position:absolute;top:55px;left:0;width:100%;z-index:50;display:flex;justify-content:space-between;padding:6px 10px;pointer-events:none;font-size:13px;letter-spacing:1px;text-shadow:2px 2px 0 #000,-1px -1px 0 #000;}
.hud-left{display:flex;flex-direction:column;gap:3px}
.hud-box{background:rgba(0,0,0,.7);padding:5px 9px;border:1px solid currentColor;width:fit-content;font-size:12px;}
.hud-score{font-size:32px;text-align:right}
.ctrls{position:absolute;bottom:0;left:0;width:100%;z-index:50;display:flex;gap:8px;padding:10px;flex-wrap:wrap;background:rgba(0,0,0,.7);pointer-events:auto;padding-bottom:max(10px,env(safe-area-inset-bottom,0px));}
button{background:rgba(0,0,0,.8);border:1px solid #0f0;color:#0f0;padding:8px 12px;font-size:14px;cursor:pointer;letter-spacing:2px;font-family:'VT323',monospace;text-transform:uppercase;}
#go{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none;z-index:200;pointer-events:auto;background:#000;padding:30px 40px;border:2px solid #0ff;box-shadow:0 0 40px rgba(0,255,255,.3);font-family:'VT323',monospace;}
#go h1{font-size:28px;letter-spacing:4px;margin-bottom:10px}
#go p{font-size:16px;margin-bottom:5px}
</style>
</head>
<body>
<div id="nav">
    <a href="index.html" style="color:#ff8c00">[1]SUNRISE</a><span>|</span>
    <a href="flappy.html" style="color:#00ffcc">[2]FLAPPY</a><span>|</span>
    <a href="billiards.html" style="color:#ff00ff">[3]WINDING</a><span>|</span>
    <a href="invaders.html" style="color:#ff0055">[4]INVADERS</a><span>|</span>
    <a href="weaver.html" style="color:#b366ff">[5]WEAVER</a><span>|</span>
    <a href="simon.html" style="color:#fff">[6]SIMON</a>
</div>
<canvas id="c-bg"></canvas>
<canvas id="c-game"></canvas>
<canvas id="c-munker"></canvas>
<div class="hud">
    <div class="hud-left">
        <div id="h-title" style="font-size:20px;letter-spacing:4px;color:#0ff;text-shadow:0 0 8px #0ff">HARMONIC WINDING</div>
        <div class="hud-box" id="h-box" style="color:#0ff">
            <div id="h-note">NOTE: --</div>
            <div id="h-bounces">BOUNCES: 0</div>
            <div id="h-target">TARGET: --</div>
            <div id="h-interval">INTERVAL: --</div>
            <div id="h-dim">DIM: 1 — TRIAD</div>
        </div>
    </div>
    <div>
        <div style="font-size:11px;color:#aaa;text-align:right">WINDING</div>
        <div class="hud-score" id="h-score" style="color:#0ff">0</div>
        <div style="font-size:11px;color:#555;text-align:right">BEST <span id="h-best">0</span></div>
    </div>
</div>
<div class="ctrls">
    <button id="b-mic" style="border-color:#0f0;color:#0f0">START MIC</button>
    <button id="b-mode" style="border-color:#f0f;color:#f0f">MODE: STUDY</button>
    <button id="b-dim" style="border-color:#ff0;color:#ff0">NEXT DIM</button>
</div>
<div id="go">
    <h1 style="color:#0ff">UNRAVELLED!</h1>
    <p style="color:#0f0">Winding: <span id="go-score" style="font-size:22px">0</span></p>
    <p style="color:#aaa;font-size:12px" id="go-dim"></p>
    <button onclick="startGame()" style="margin-top:14px;border-color:#0ff;color:#0ff">REWIND</button>
</div>
<script>
const NOTE=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const HUE=[0,30,55,80,110,145,175,200,230,265,295,330];
const INTERVALS=[{name:'Min 2nd',st:1},{name:'Maj 2nd',st:2},{name:'Min 3rd',st:3},{name:'Maj 3rd',st:4},{name:'P4th',st:5},{name:'Tritone',st:6},{name:'P5th',st:7},{name:'Min 6th',st:8},{name:'Maj 6th',st:9},{name:'Min 7th',st:10},{name:'Maj 7th',st:11}];
const DIM_SIDES=[3,4,5,6,7,12];
const DIM_NAMES=['TRIAD','TETRAD','PENTA','HEXA','HEPTA','CHROMA'];
const PALETTES=[[[0,255,255],[255,0,255],[255,255,0],[0,0,255]],[[0,255,0],[128,0,128],[0,128,255],[255,165,0]],[[255,0,100],[0,255,100],[100,0,255],[255,255,255]],[[255,50,0],[0,255,200],[200,0,255],[255,255,0]]];
const MUNKER_PAIRS=[['#00FFFF','#FF00FF'],['#800080','#00FF00'],['#0000FF','#FFFF00'],['#FF0000','#0000FF']];
const BG_RULES=[30,90,110,150,105,73,22,126,45,169];
const CA_PIXEL=8,B_CA=64,POCKET_R=22,BALL_R=13,FRICTION=0.986;

const cBg=document.getElementById('c-bg'),ctxBg=cBg.getContext('2d');
const cGame=document.getElementById('c-game'),ctx=cGame.getContext('2d');
const cMunker=document.getElementById('c-munker'),ctxM=cMunker.getContext('2d');
const rulCv=document.createElement('canvas'),rCtx=rulCv.getContext('2d');
const boardCv=document.createElement('canvas'),bCtx=boardCv.getContext('2d');
boardCv.width=B_CA;boardCv.height=B_CA;
let bData=new Uint8Array(B_CA*B_CA),bDataNext=new Uint8Array(B_CA*B_CA),trailData=new Uint8Array(B_CA*B_CA);
let W,H,frame=0,CA_W=1,CA_H=1,caData,bgRowColors;
let currentPalette=PALETTES[0],currentMunker=MUNKER_PAIRS[0],bgPaletteShift=0,bgRule=30,currentRule=0;
let impactRipples=[];

// Audio
let audioCtx2,analyser2,dataArray2,micOn=false,audioLevel=0,harmonicSpectrum=0;
let currentPc=-1,candPc=-1,candF=0;

async function startMic(){
    try{
        audioCtx2=new(window.AudioContext||window.webkitAudioContext)();
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        const src=audioCtx2.createMediaStreamSource(stream);
        analyser2=audioCtx2.createAnalyser();analyser2.fftSize=8192;analyser2.smoothingTimeConstant=0.82;
        src.connect(analyser2);dataArray2=new Uint8Array(analyser2.frequencyBinCount);
        micOn=true;return true;
    }catch(e){return false;}
}
function pc(hz){if(hz<=0)return -1;let h=Math.round(12*Math.log2(hz/16.35));return((h%12)+12)%12;}
function readPitch(){
    if(!micOn)return -1;
    analyser2.getByteFrequencyData(dataArray2);
    const sr=audioCtx2.sampleRate,bHz=sr/analyser2.fftSize;
    const lo=Math.floor(80/bHz),hi=Math.floor(3000/bHz);
    let maxV=0,maxI=-1;
    for(let i=lo;i<hi&&i<dataArray2.length;i++){if(dataArray2[i]>maxV){maxV=dataArray2[i];maxI=i;}}
    return maxV>110?pc(maxI*bHz):-1;
}
function getAudioLevel(){
    if(!micOn||!dataArray2)return 0;
    let s=0;for(let i=0;i<32;i++)s+=dataArray2[i];return s/(32*255)*100;
}

// Game state
let score=0,best=0,bounces=0,dimension=0,targetNote=-1,targetsSunk=0,studyMode=true,gameState='IDLE';
try{best=parseInt(localStorage.getItem('winding3Best')||'0');}catch(e){}
document.getElementById('h-best').innerText=best;

// Geometry
let shape={cx:0,cy:0,r:0,vertices:[],pockets:[]};
let boardRect={x:0,y:0,size:0};

function buildTable(){
    shape.cx=W/2;shape.cy=H/2+15;shape.r=Math.min(W,H)*0.35;
    const sides=DIM_SIDES[dimension];
    const rot=-Math.PI/2+(sides%2===0?Math.PI/sides:0);
    const verts=[],pockets=[];
    for(let i=0;i<sides;i++){
        const a=rot+(i*2*Math.PI/sides);
        verts.push({x:shape.cx+shape.r*Math.cos(a),y:shape.cy+shape.r*Math.sin(a)});
        pockets.push({x:shape.cx+shape.r*Math.cos(a),y:shape.cy+shape.r*Math.sin(a),note:(i*Math.floor(12/sides))%12});
    }
    shape.vertices=verts;shape.pockets=pockets;
    boardRect={x:shape.cx-shape.r*1.5,y:shape.cy-shape.r*1.5,size:shape.r*3};
}

// Balls
let balls=[];
class Ball{
    constructor(x,y,type,note){this.x=x;this.y=y;this.vx=0;this.vy=0;this.type=type;this.note=note;this.r=BALL_R;this.angle=0;this.sinking=false;this.dead=false;this.targetPocket=null;this.lastBounce=0;}
    update(){
        if(this.dead||this.sinking)return;
        if(micOn&&audioLevel>20){const dx=this.x-shape.cx,dy=this.y-shape.cy,dist=Math.hypot(dx,dy)||1,force=(audioLevel*0.006)/(dist*0.01);this.vx+=(dx/dist)*force;this.vy+=(dy/dist)*force;}
        this.vx*=FRICTION;this.vy*=FRICTION;
        const spd=Math.hypot(this.vx,this.vy);
        if(spd>16){this.vx=this.vx/spd*16;this.vy=this.vy/spd*16;}else if(spd<0.05){this.vx=0;this.vy=0;}
    }
    draw(){
        if(this.dead)return;
        ctx.save();ctx.translate(this.x,this.y);
        ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.arc(3,3,this.r,0,Math.PI*2);ctx.fill();
        ctx.rotate(this.angle);
        ctx.fillStyle=this.type==='WHITE'?'#eee':this.type==='BLACK'?'#222':'#888';
        ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.arc(-this.r*.3,-this.r*.3,this.r*.35,0,Math.PI*2);ctx.fill();
        if(this.type==='TARGET'){
            const lbl=(!studyMode&&this.note===targetNote)?'?':NOTE[this.note];
            ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lbl,0,1);
        }
        ctx.restore();
    }
}

function initBalls(){
    const cx=shape.cx,cy=shape.cy;
    let minD=Infinity;
    shape.vertices.forEach((v,i)=>{
        const B=shape.vertices[(i+1)%shape.vertices.length];
        const dx=B.x-v.x,dy=B.y-v.y,len2=dx*dx+dy*dy;
        if(len2===0)return;
        const t=Math.max(0,Math.min(1,((cx-v.x)*dx+(cy-v.y)*dy)/len2));
        const d=Math.hypot(cx-(v.x+t*dx),cy-(v.y+t*dy));
        if(d<minD)minD=d;
    });
    const safeR=minD===Infinity?shape.r*0.4:minD;
    const spread=Math.max(BALL_R*2.5,Math.min(safeR*0.55,50));
    const whiteDist=Math.min(spread*1.4,safeR*0.7);
    balls=[
        new Ball(cx,cy,'BLACK',-1),
        new Ball(cx-spread,cy-spread,'TARGET',(0*Math.floor(12/DIM_SIDES[dimension]))%12),
        new Ball(cx+spread,cy-spread,'TARGET',(1*Math.floor(12/DIM_SIDES[dimension]))%12),
        new Ball(cx-spread,cy+spread,'TARGET',(2*Math.floor(12/DIM_SIDES[dimension]))%12),
        new Ball(cx+spread,cy+spread,'TARGET',(3*Math.floor(12/DIM_SIDES[dimension]))%12),
        new Ball(cx,cy+whiteDist,'WHITE',-1),
    ];
    targetsSunk=0;pickNextTarget();
}

function pickNextTarget(){
    const rem=balls.filter(b=>b.type==='TARGET'&&!b.dead);
    if(rem.length===0){nextDimension();return;}
    targetNote=rem[0].note;updateHUD();
}

function updateHUD(){
    const col=currentPc>=0?`hsl(${HUE[currentPc]},100%,60%)`:'#0ff';
    document.getElementById('h-box').style.borderColor=col;document.getElementById('h-box').style.color=col;
    document.getElementById('h-score').style.color=col;
    document.getElementById('h-note').innerText=`NOTE: ${currentPc>=0?NOTE[currentPc]:'--'}`;
    document.getElementById('h-bounces').innerText=`BOUNCES: ${bounces}`;
    document.getElementById('h-dim').innerText=`DIM: ${dimension+1} — ${DIM_NAMES[dimension]}`;
    document.getElementById('h-target').innerText=studyMode&&targetNote>=0?`TARGET: ${NOTE[targetNote]}`:'TARGET: ???';
    const intSt=currentPc>=0&&targetNote>=0?(targetNote-currentPc+12)%12:-1;
    const intObj=intSt>0?INTERVALS.find(iv=>iv.st===intSt):null;
    document.getElementById('h-interval').innerText=intObj?`INTERVAL: ${intObj.name}`:'INTERVAL: --';
    document.getElementById('h-score').innerText=score;
}

function nextDimension(){
    dimension=Math.min(dimension+1,DIM_SIDES.length-1);
    currentPalette=PALETTES[dimension%PALETTES.length];currentMunker=MUNKER_PAIRS[dimension%MUNKER_PAIRS.length];
    bgRule=BG_RULES[Math.floor(Math.random()*BG_RULES.length)];currentRule=(currentRule+1)%8;
    if(caData)caData.fill(0);trailData.fill(0);bData.fill(0);bgRowColors&&bgRowColors.fill(0);
    if(caData&&caData.length>0)caData[Math.floor(CA_W/2)]=1;
    impactRipples=[];buildTable();initBalls();
    document.getElementById('b-dim').innerText=`DIM: ${dimension+1}`;updateHUD();
}

function startGame(){
    score=0;bounces=0;dimension=0;targetsSunk=0;
    currentPalette=PALETTES[0];currentMunker=MUNKER_PAIRS[0];bgRule=30;currentRule=0;bgPaletteShift=0;impactRipples=[];
    buildTable();initBalls();gameState='PLAYING';document.getElementById('go').style.display='none';updateHUD();
}

// Drag
let drag={active:false,x:0,y:0};
function getPos(e){const r=cGame.getBoundingClientRect(),cl=e.touches?e.touches[0]:e;return{x:(cl.clientX-r.left)*(W/r.width),y:(cl.clientY-r.top)*(H/r.height)};}
cGame.addEventListener('mousedown',e=>{if(gameState!=='PLAYING')return;const p=getPos(e);const wb=balls.find(b=>b.type==='WHITE'&&!b.sinking&&!b.dead);if(wb&&Math.hypot(p.x-wb.x,p.y-wb.y)<wb.r*3){drag.active=true;drag.x=p.x;drag.y=p.y;}});
window.addEventListener('mousemove',e=>{if(drag.active){const p=getPos(e);drag.x=p.x;drag.y=p.y;}});
window.addEventListener('mouseup',e=>{if(!drag.active)return;drag.active=false;const wb=balls.find(b=>b.type==='WHITE'&&!b.sinking&&!b.dead);if(!wb)return;const dx=wb.x-drag.x,dy=wb.y-drag.y,len=Math.hypot(dx,dy);if(len>8){const pw=Math.min(len/300,1);wb.vx=(dx/len)*pw*20;wb.vy=(dy/len)*pw*20;}});
cGame.addEventListener('touchstart',e=>{if(gameState!=='PLAYING')return;const p=getPos(e);const wb=balls.find(b=>b.type==='WHITE'&&!b.sinking&&!b.dead);if(wb&&Math.hypot(p.x-wb.x,p.y-wb.y)<wb.r*4){drag.active=true;drag.x=p.x;drag.y=p.y;}},{passive:true});
cGame.addEventListener('touchmove',e=>{if(drag.active){const p=getPos(e);drag.x=p.x;drag.y=p.y;}},{passive:false});
cGame.addEventListener('touchend',e=>{if(!drag.active)return;drag.active=false;const wb=balls.find(b=>b.type==='WHITE'&&!b.sinking&&!b.dead);if(!wb)return;const dx=wb.x-drag.x,dy=wb.y-drag.y,len=Math.hypot(dx,dy);if(len>8){const pw=Math.min(len/300,1);wb.vx=(dx/len)*pw*20;wb.vy=(dy/len)*pw*20;}});

// Buttons
document.getElementById('b-mic').addEventListener('click',async e=>{const ok=await startMic();if(ok){e.target.innerText='MIC ON';e.target.style.borderColor='#0ff';e.target.style.color='#0ff';if(gameState==='IDLE')startGame();}});
document.getElementById('b-mode').addEventListener('click',()=>{studyMode=!studyMode;const b=document.getElementById('b-mode');b.innerText=`MODE: ${studyMode?'STUDY':'BLIND'}`;b.style.borderColor=studyMode?'#f0f':'#ff0';b.style.color=studyMode?'#f0f':'#ff0';updateHUD();});
document.getElementById('b-dim').addEventListener('click',()=>{if(gameState==='PLAYING')nextDimension();});

// CA background
function updateBgRuliad(){
    if(CA_W<=0||CA_H<=0)return;
    let prevRow=new Uint8Array(CA_W);
    for(let x=0;x<CA_W;x++)prevRow[x]=caData[(CA_H>1?1:0)*CA_W+x];
    for(let y=CA_H-1;y>0;y--){for(let x=0;x<CA_W;x++)caData[y*CA_W+x]=caData[(y-1)*CA_W+x];bgRowColors[y]=bgRowColors[y-1];}
    bgRowColors[0]=bgPaletteShift;
    let ar=bgRule;
    if(micOn&&audioLevel>15&&harmonicSpectrum>5)ar=Math.floor(harmonicSpectrum*2.55);
    for(let x=0;x<CA_W;x++){const l=prevRow[x===0?CA_W-1:x-1]?4:0,c=prevRow[x]?2:0,r=prevRow[x===CA_W-1?0:x+1]?1:0;caData[x]=(ar&(1<<(l+c+r)))?1:0;}
    balls.forEach(b=>{if(b.dead)return;const bx=Math.floor((b.x/W)*CA_W);if(bx>=0&&bx<CA_W)caData[bx]=1;});
    const img=rCtx.createImageData(CA_W,CA_H);
    for(let y=0;y<CA_H;y++){const rs=bgRowColors[y]||0,bg=currentPalette[(0+rs)%4],fg=currentPalette[(2+rs)%4];for(let x=0;x<CA_W;x++){const i=y*CA_W+x,idx=i*4;if(caData[i]>0){img.data[idx]=fg[0];img.data[idx+1]=fg[1];img.data[idx+2]=fg[2];img.data[idx+3]=255;}else{img.data[idx]=Math.floor(bg[0]*.15);img.data[idx+1]=Math.floor(bg[1]*.15);img.data[idx+2]=Math.floor(bg[2]*.15);img.data[idx+3]=255;}}}
    rCtx.putImageData(img,0,0);
}

function updateBoardRuliad(){
    for(let i=0;i<trailData.length;i++)if(trailData[i]>0)trailData[i]=Math.max(0,trailData[i]-3);
    const img=bCtx.createImageData(B_CA,B_CA);const t=Math.floor(frame/3);const scale=1+(dimension%3)*0.5;
    for(let y=0;y<B_CA;y++){for(let x=0;x<B_CA;x++){const i=y*B_CA+x,prev=bData[i],sx=Math.floor((x-B_CA/2)/scale),sy=Math.floor((y-B_CA/2)/scale),rm=currentRule%8;let v=0;
    if(rm===0)v=(sx^sy)^prev;else if(rm===1)v=(sx&sy)^(prev*2);else if(rm===2)v=(sx|sy)^prev;else if(rm===3)v=Math.floor(Math.sqrt(sx*sx+sy*sy))^prev;else if(rm===4)v=(sx*sx^sy*sy)%Math.max(1,prev);else if(rm===5)v=(sx*prev)^(sy*prev);else if(rm===6)v=(sx+sy)^(sx-sy)^prev;else v=Math.abs(sx^sy)*2^prev;
    const val=Math.abs(v-t*3+trailData[i]*1.5);bDataNext[i]=val%256;const cs=Math.floor(frame/15),ci=(Math.floor(bDataNext[i]/64)+cs)%4,c=currentPalette[ci];const idx=i*4;
    img.data[idx]=trailData[i]>200?255:c[0];img.data[idx+1]=trailData[i]>200?255:c[1];img.data[idx+2]=trailData[i]>200?150:c[2];img.data[idx+3]=255;}}
    for(let i=0;i<B_CA*B_CA;i++)bData[i]=bDataNext[i];bCtx.putImageData(img,0,0);
}

function drawShapePath(c,distort=false){
    c.beginPath();
    shape.vertices.forEach((v,i)=>{
        let px=v.x,py=v.y;
        if(distort&&micOn&&audioLevel>15&&dataArray2){const bin=Math.floor((i/shape.vertices.length)*(dataArray2.length/2));const force=(dataArray2[bin]/255)*(audioLevel*0.4);const angle=Math.atan2(v.y-shape.cy,v.x-shape.cx);px+=Math.cos(angle)*force;py+=Math.sin(angle)*force;}
        if(i===0)c.moveTo(px,py);else c.lineTo(px,py);
    });c.closePath();
}

function drawBoard(){
    ctx.save();drawShapePath(ctx,false);ctx.clip();ctx.imageSmoothingEnabled=false;ctx.drawImage(boardCv,boardRect.x,boardRect.y,boardRect.size,boardRect.size);ctx.restore();
    // Munker stripes inside board
    ctx.save();drawShapePath(ctx,false);ctx.clip();
    for(let y=boardRect.y;y<boardRect.y+boardRect.size;y+=12){ctx.fillStyle=currentMunker[0];ctx.fillRect(boardRect.x,y,boardRect.size,3);ctx.fillStyle=currentMunker[1];ctx.fillRect(boardRect.x,y+6,boardRect.size,3);}
    ctx.restore();
    ctx.strokeStyle='#fff';ctx.lineWidth=3;drawShapePath(ctx,true);ctx.stroke();
}

function drawPockets(){
    shape.pockets.forEach((p,i)=>{
        ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,POCKET_R,0,Math.PI*2);ctx.clip();ctx.fillStyle='#000';ctx.fill();
        if(rulCv.width>0&&rulCv.height>0){ctx.translate(p.x,p.y);ctx.rotate((frame*0.005)+(i*Math.PI/4));ctx.scale(0.4,0.4);ctx.translate(-W/2,-H/2);ctx.drawImage(rulCv,0,0,W,H);}
        ctx.restore();
        ctx.beginPath();ctx.arc(p.x,p.y,POCKET_R,0,Math.PI*2);
        const isTarget=p.note===targetNote,isSinging=p.note===currentPc;
        const fg=currentPalette[(2+bgPaletteShift)%4];
        ctx.strokeStyle=isSinging?`rgb(${fg[0]},${fg[1]},${fg[2]})`:`rgba(${fg[0]},${fg[1]},${fg[2]},${isTarget?0.9:0.35})`;
        ctx.lineWidth=isSinging?3:isTarget?2:1;if(isSinging){ctx.shadowBlur=10;ctx.shadowColor=`rgb(${fg[0]},${fg[1]},${fg[2]})`;}
        ctx.stroke();ctx.shadowBlur=0;
        ctx.fillStyle=isTarget?'#fff':'rgba(255,255,255,0.4)';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText((!studyMode&&p.note===targetNote)?'?':NOTE[p.note],p.x,p.y);
    });
}

function drawRipples(){
    ctx.save();ctx.globalCompositeOperation='color-dodge';
    for(let i=impactRipples.length-1;i>=0;i--){const rip=impactRipples[i];rip.r+=12;const c=currentPalette[(2+rip.cs)%4];const alpha=Math.max(0,1-(rip.r/(Math.max(W,H)*0.8)));ctx.beginPath();ctx.arc(rip.x,rip.y,rip.r,0,Math.PI*2);ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${alpha*0.8})`;ctx.lineWidth=22;ctx.stroke();if(alpha<=0)impactRipples.splice(i,1);}
    ctx.restore();
}

function drawAimLine(){
    if(!drag.active)return;const wb=balls.find(b=>b.type==='WHITE'&&!b.sinking&&!b.dead);if(!wb)return;
    ctx.save();ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=2;ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(wb.x,wb.y);ctx.lineTo(drag.x,drag.y);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(drag.x,drag.y,4,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();ctx.restore();
}

function drawConcentricRings(){
    const cx=W/2,cy=H*0.85,maxR=Math.max(W,H)*0.75,numR=20;
    ctx.save();
    for(let i=0;i<numR;i++){const t=((frame*0.5+i*(maxR/numR))%maxR);const alpha=0.12+0.18*(1-t/maxR);const c=currentPalette[i%4];ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${alpha})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,t,0,Math.PI*2);ctx.stroke();}
    ctx.restore();
}

function drawFullMunker(){
    ctxM.clearRect(0,0,W,H);
    for(let y=0;y<H;y++){const m=y%12;if(m<2){ctxM.fillStyle=currentMunker[0];ctxM.globalAlpha=0.32;ctxM.fillRect(0,y,W,1);}else if(m>=6&&m<8){ctxM.fillStyle=currentMunker[1];ctxM.globalAlpha=0.32;ctxM.fillRect(0,y,W,1);}}
    ctxM.globalAlpha=1;
}

function physicStep(){
    const dt=1/4;
    for(let step=0;step<4;step++){
        balls.forEach(b=>{
            if(b.dead)return;b.update();if(b.sinking)return;
            b.x+=b.vx*dt;b.y+=b.vy*dt;b.angle+=Math.hypot(b.vx,b.vy)*0.05*dt;
            let hit=false,ox=0,oy=0;
            for(let i=0;i<shape.vertices.length;i++){const A=shape.vertices[i],B=shape.vertices[(i+1)%shape.vertices.length];const dx=B.x-A.x,dy=B.y-A.y,len2=dx*dx+dy*dy;if(len2===0)continue;const tl=Math.max(0,Math.min(1,((b.x-A.x)*dx+(b.y-A.y)*dy)/len2));const cx2=A.x+tl*dx,cy2=A.y+tl*dy,distX=b.x-cx2,distY=b.y-cy2,dist=Math.hypot(distX,distY);if(dist<b.r&&dist>0.01){const nx=distX/dist,ny=distY/dist;ox+=nx*(b.r-dist);oy+=ny*(b.r-dist);const dot=b.vx*nx+b.vy*ny;if(dot<0){b.vx-=2*dot*nx;b.vy-=2*dot*ny;hit=true;}}}
            b.x+=ox;b.y+=oy;
            if(hit&&frame-b.lastBounce>5){b.lastBounce=frame;bgPaletteShift=(bgPaletteShift+1)%4;impactRipples.push({x:b.x,y:b.y,r:0,cs:bgPaletteShift});bounces++;updateHUD();}
            shape.pockets.forEach(p=>{const dist=Math.hypot(b.x-p.x,b.y-p.y);if(dist<POCKET_R*2.5&&dist>POCKET_R*1.5){const pull=0.8*(1-dist/(POCKET_R*2.5))*dt;b.vx+=((p.x-b.x)/dist)*pull;b.vy+=((p.y-b.y)/dist)*pull;}if(dist<=POCKET_R*1.5&&!b.sinking){b.sinking=true;b.targetPocket=p;}});
            const caX=Math.floor(((b.x-boardRect.x)/boardRect.size)*B_CA),caY=Math.floor(((b.y-boardRect.y)/boardRect.size)*B_CA),heat=micOn&&audioLevel>15?255:120;
            if(caX>=0&&caX<B_CA&&caY>=0&&caY<B_CA)trailData[caY*B_CA+caX]=heat;
        });
        for(let i=0;i<balls.length;i++){for(let j=i+1;j<balls.length;j++){const b1=balls[i],b2=balls[j];if(b1.sinking||b2.sinking||b1.dead||b2.dead)continue;const dx=b2.x-b1.x,dy=b2.y-b1.y,dist=Math.hypot(dx,dy),minD=b1.r+b2.r;if(dist<minD&&dist>0){const nx=dx/dist,ny=dy/dist,ov=minD-dist;b1.x-=nx*ov/2;b1.y-=ny*ov/2;b2.x+=nx*ov/2;b2.y+=ny*ov/2;const kx=b1.vx-b2.vx,ky=b1.vy-b2.vy,p2=nx*kx+ny*ky;if(p2>0){b1.vx-=p2*nx;b1.vy-=p2*ny;b2.vx+=p2*nx;b2.vy+=p2*ny;}}}}
        balls.forEach(b=>{if(!b.sinking||b.dead)return;const dx=b.targetPocket.x-b.x,dy=b.targetPocket.y-b.y,dist=Math.hypot(dx,dy);if(dist<POCKET_R*0.5){if(b.type==='WHITE'){b.sinking=false;b.x=shape.cx;b.y=shape.cy+80;b.vx=0;b.vy=0;}else if(b.type==='TARGET'){b.dead=true;b.sinking=false;score+=10+Math.floor(bounces/5);document.getElementById('h-score').innerText=score;targetsSunk++;if(score>best){best=score;try{localStorage.setItem('winding3Best',best);}catch(e){}document.getElementById('h-best').innerText=best;}setTimeout(pickNextTarget,400);}else if(b.type==='BLACK'){b.sinking=false;b.x=shape.cx;b.y=shape.cy;b.vx=(Math.random()-.5)*2;b.vy=(Math.random()-.5)*2;}}else{b.vx=(dx/dist)*15;b.vy=(dy/dist)*15;b.x+=b.vx*dt;b.y+=b.vy*dt;}});
    }
    balls=balls.filter(b=>!b.dead);
}

function resize(){
    W=window.innerWidth;H=window.innerHeight;
    [cBg,cGame,cMunker].forEach(c=>{c.width=W;c.height=H;});
    CA_W=Math.max(1,Math.ceil(W/CA_PIXEL));CA_H=Math.max(1,Math.ceil(H/CA_PIXEL));
    rulCv.width=CA_W;rulCv.height=CA_H;caData=new Uint8Array(CA_W*CA_H);bgRowColors=new Uint8Array(CA_H);caData[Math.floor(CA_W/2)]=1;
    buildTable();if(gameState==='PLAYING')initBalls();
}
window.addEventListener('resize',resize);

function loop(){
    requestAnimationFrame(loop);frame++;
    if(micOn&&dataArray2){
        analyser2.getByteFrequencyData(dataArray2);audioLevel=getAudioLevel();
        let maxA=0,domBin=0;for(let i=0;i<dataArray2.length;i++)if(dataArray2[i]>maxA){maxA=dataArray2[i];domBin=i;}
        harmonicSpectrum=maxA>15?(domBin/dataArray2.length)*100:0;
        const raw=readPitch();if(raw>=0){if(raw===candPc)candF++;else{candPc=raw;candF=1;}if(candF>=3){currentPc=raw;updateHUD();}}else{candF=0;currentPc=-1;}
    }
    if(frame%4===0)updateBgRuliad();
    ctxBg.fillStyle='#000';ctxBg.fillRect(0,0,W,H);
    ctxBg.imageSmoothingEnabled=false;if(rulCv.width>0&&rulCv.height>0)ctxBg.drawImage(rulCv,0,0,W,H);
    ctx.clearRect(0,0,W,H);
    drawConcentricRings();
    drawRipples();
    if(gameState==='PLAYING'){updateBoardRuliad();drawBoard();drawPockets();drawAimLine();physicStep();balls.forEach(b=>b.draw());}
    drawFullMunker();
}

resize();loop();
</script>
