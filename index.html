#go{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none;z-index:200;pointer-events:auto;background:#000;padding:28px 38px;border:2px solid #0ff;box-shadow:0 0 40px rgba(0,255,255,.2);font-family:'VT323',monospace}

<script>
// ── SHARED CONSTANTS ──────────────────────────────────────────────────────────
const NOTE=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const HUE=[0,30,55,80,110,145,175,200,230,265,295,330];
const PALETTES=[
  [[0,255,255],[255,0,255],[255,255,0],[0,0,255]],
  [[0,255,0],[128,0,128],[0,128,255],[255,165,0]],
  [[255,0,100],[0,255,100],[100,0,255],[255,255,255]],
  [[255,50,0],[0,255,200],[200,0,255],[255,255,0]]
];
const MUNKER_PAIRS=[['#00FFFF','#FF00FF'],['#800080','#00FF00'],['#0000FF','#FFFF00'],['#FF0000','#0000FF']];
const BG_RULES=[30,90,110,150,105,73,22,126];
const CA_PX=12, B_CA=48;  // larger pixels = fewer cells = no freeze
const NOTE_HOLD=3, SIL_RST=28;

// ── CANVAS / RENDERER ─────────────────────────────────────────────────────────
const cBg  =document.getElementById('c-bg'),   ctxBg=cBg.getContext('2d');
const cGame=document.getElementById('c-game'),  ctx  =cGame.getContext('2d');
const cMk  =document.getElementById('c-munker'),ctxMk=cMk.getContext('2d');
const rulCv=document.createElement('canvas'),   rCtx =rulCv.getContext('2d');

let W,H,CX,CY,frame=0;
let CA_W=1,CA_H=1,caData,bgRowColors;
let curPalette=PALETTES[0],curMunker=MUNKER_PAIRS[0];
let bgPalShift=0,bgRule=30,curRule=0,impactRips=[];

function initCA(){
  CA_W=Math.max(1,Math.ceil(W/CA_PX));
  CA_H=Math.max(1,Math.ceil(H/CA_PX));
  rulCv.width=CA_W; rulCv.height=CA_H;
  caData=new Uint8Array(CA_W*CA_H);
  bgRowColors=new Uint8Array(CA_H);
  caData[Math.floor(CA_W/2)]=1;
}

function updateBgCA(hue){
  if(CA_W<=0||CA_H<=0)return;
  let prev=new Uint8Array(CA_W);
  for(let x=0;x<CA_W;x++) prev[x]=caData[(CA_H>1?1:0)*CA_W+x];
  for(let y=CA_H-1;y>0;y--){
    for(let x=0;x<CA_W;x++) caData[y*CA_W+x]=caData[(y-1)*CA_W+x];
    bgRowColors[y]=bgRowColors[y-1];
  }
  bgRowColors[0]=bgPalShift;
  for(let x=0;x<CA_W;x++){
    const l=prev[x===0?CA_W-1:x-1]?4:0,c=prev[x]?2:0,r=prev[x===CA_W-1?0:x+1]?1:0;
    caData[x]=(bgRule&(1<<(l+c+r)))?1:0;
  }
  const img=rCtx.createImageData(CA_W,CA_H);
  for(let y=0;y<CA_H;y++){
    const rs=bgRowColors[y]||0,bg=curPalette[(0+rs)%4],fg=curPalette[(2+rs)%4];
    for(let x=0;x<CA_W;x++){
      const i=y*CA_W+x,idx=i*4;
      if(caData[i]){img.data[idx]=fg[0];img.data[idx+1]=fg[1];img.data[idx+2]=fg[2];img.data[idx+3]=255;}
      else{img.data[idx]=Math.floor(bg[0]*.12);img.data[idx+1]=Math.floor(bg[1]*.12);img.data[idx+2]=Math.floor(bg[2]*.12);img.data[idx+3]=255;}
    }
  }
  rCtx.putImageData(img,0,0);
}

function drawRipples(){
  if(impactRips.length>6)impactRips.length=6;
  ctx.save();ctx.globalCompositeOperation='color-dodge';
  for(let i=impactRips.length-1;i>=0;i--){
    const r=impactRips[i];r.rad+=10;
    const c=curPalette[(2+r.cs)%4];
    const alpha=Math.max(0,1-(r.rad/(Math.max(W,H)*0.7)));
    ctx.beginPath();ctx.arc(r.x,r.y,r.rad,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${alpha*0.7})`;
    ctx.lineWidth=20;ctx.stroke();
    if(alpha<=0)impactRips.splice(i,1);
  }
  ctx.restore();
}

function drawConcentricRings(cx2,cy2,tint){
  const maxR=Math.max(W,H)*0.65,numR=10;
  ctx.save();
  for(let i=0;i<numR;i++){
    const t=((frame*0.4+i*(maxR/numR))%maxR);
    const alpha=0.1+0.12*(1-t/maxR);
    const c=curPalette[i%4];
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
    ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx2,cy2+H*0.35,t,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}

// Munker stripe offscreen canvas — rebuilt only when palette/size changes
let munkerCV=null,munkerDirty=true,munkerW=0,munkerH=0,munkerPair=['',''];
function rebuildMunker(){
  if(!munkerCV)munkerCV=document.createElement('canvas');
  munkerCV.width=4; munkerCV.height=12; // tile
  const mc=munkerCV.getContext('2d');
  // Parse hex colour to rgba
  function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
  mc.clearRect(0,0,4,12);
  mc.fillStyle=hexToRgba(curMunker[0],0.32); mc.fillRect(0,0,4,2);
  mc.fillStyle=hexToRgba(curMunker[1],0.32); mc.fillRect(0,6,4,2);
  munkerPair=[...curMunker]; munkerDirty=false;
}
function drawFullMunker(){
  if(munkerDirty||munkerPair[0]!==curMunker[0]||munkerPair[1]!==curMunker[1]) rebuildMunker();
  const pat=ctxMk.createPattern(munkerCV,'repeat');
  ctxMk.clearRect(0,0,W,H);
  ctxMk.fillStyle=pat;
  ctxMk.fillRect(0,0,W,H);
}

// Pixel planet
function pixPlanet(c2,x,y,r,base,hi2,px=3){
  for(let py=-r;py<=r;py+=px) for(let ppx=-r;ppx<=r;ppx+=px)
    if(ppx*ppx+py*py<=r*r){c2.fillStyle=(ppx<0&&py<0)?hi2:base;c2.fillRect(Math.round(x+ppx),Math.round(y+py),px,px);}
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let audioCtx,analyser,dataArray,micOn=false,audioLevel=0;
let lastPC=-1,cand=-1,candF=0,silF=0;

async function startMic(){
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=8192; analyser.smoothingTimeConstant=0.78;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    dataArray=new Uint8Array(analyser.frequencyBinCount);
    micOn=true; return true;
  }catch(e){return false;}
}

function readPitch(thr=105){
  if(!micOn||!dataArray)return -1;
  analyser.getByteFrequencyData(dataArray);
  const bHz=audioCtx.sampleRate/analyser.fftSize;
  const lo=Math.floor(80/bHz),hi=Math.min(Math.floor(2500/bHz),dataArray.length-1);
  let mx=0,mi=-1;
  for(let i=lo;i<=hi;i++) if(dataArray[i]>mx){mx=dataArray[i];mi=i;}
  let s=0; for(let i=0;i<64;i++) s+=dataArray[i];
  audioLevel=s/(64*255)*100;
  if(mx<thr||mi<0)return -1;
  let h=Math.round(12*Math.log2((mi*bHz)/16.35));
  return((h%12)+12)%12;
}

// ── SHARED GAME STATE ─────────────────────────────────────────────────────────
let currentMode='ORBIT';
let gameState='IDLE'; // IDLE PLAYING DEAD
let score=0,bestScore=0;
const bestKey='sunriseBest3';
try{bestScore=parseInt(localStorage.getItem(bestKey)||'0');}catch(e){}
document.getElementById('h-best').innerText=bestScore;

function setScore(s){
  score=s; document.getElementById('h-score').innerText=s;
  if(s>bestScore){bestScore=s;try{localStorage.setItem(bestKey,s);}catch(e){}document.getElementById('h-best').innerText=s;}
}

function die(reason,extra=''){
  gameState='DEAD';
  document.getElementById('go-title').innerText=reason;
  document.getElementById('go-score').innerText=`Score: ${score}`;
  document.getElementById('go-extra').innerText=extra;
  document.getElementById('go').style.display='block';
}

// ── ORBIT MODE ────────────────────────────────────────────────────────────────
// Always orbiting Earth. Notes assigned radially to 12 lanes.
// Asteroids come in on specific note lanes. Switch lanes by singing that note.
// Speed increases over time. Dodge = survive. Miss = knocked inward/outward.

const ORBIT_LANES    = 12;   // one per note
const ORBIT_EARTH_R  = 28;   // earth radius
const ORBIT_SAT_R    = 14;   // satellite radius (player)
const ORBIT_BASE_SPD = 0.028;// angular speed
const ORBIT_LANE_R_MIN = 0;  // offset from base orbit radius per lane

let orb = {
  angle: 0,
  speed: ORBIT_BASE_SPD,
  lane: 5,        // current lane (0=innermost 12=outermost)
  r: 0,           // computed from lane
  days: 0,
  asteroids: [],
  particles: [],
  orbMunkerPhase: 0,
};

function orbitLaneR(lane){
  // Lanes spread from minR to maxR
  const minR = ORBIT_EARTH_R + ORBIT_SAT_R + 12;
  const maxR = Math.min(CX,CY) - ORBIT_SAT_R - 20;
  return minR + (lane/(ORBIT_LANES-1))*(maxR-minR);
}

function orbitNoteForLane(lane){
  return (lane*1+3)%12; // each lane = a different note
}

function orbitLaneForNote(note){
  // Reverse lookup
  for(let i=0;i<ORBIT_LANES;i++) if(orbitNoteForLane(i)===note) return i;
  return -1;
}

function spawnAsteroid(){
  // Pick a lane that is NOT the player's current lane
  let lane;
  do{ lane=Math.floor(Math.random()*ORBIT_LANES); }while(lane===orb.lane);
  const r=orbitLaneR(lane);
  const angle=orb.angle+Math.PI*(0.5+Math.random()*0.8)*(Math.random()<.5?1:-1);
  const sz=8+Math.floor(Math.random()*3)*4;
  orb.asteroids.push({lane,r,angle,sz,speed:orb.speed*(0.3+Math.random()*0.4),dead:false});
}

function resetOrbit(){
  orb.angle=0; orb.speed=ORBIT_BASE_SPD; orb.lane=5;
  orb.r=orbitLaneR(5); orb.days=0; orb.asteroids=[]; orb.particles=[];
  orb.orbMunkerPhase=0;
  curPalette=PALETTES[0]; curMunker=MUNKER_PAIRS[0]; bgPalShift=0; bgRule=30;
  document.getElementById('h-scorelabel').innerText='DAYS';
  document.getElementById('h-title').innerText='HARMONIC ORBIT';
  document.getElementById('h-title').style.color='#0ff';
  document.getElementById('h-info').innerText='SING A NOTE TO SWITCH LANE';
  document.getElementById('h-hint').innerText=`LANE NOTE: ${NOTE[orbitNoteForLane(orb.lane)]}`;
}

function tickOrbit(){
  // Speed ramp
  orb.speed = ORBIT_BASE_SPD + orb.days * 0.0004;
  orb.angle += orb.speed;

  // Day counter
  const prevDays=orb.days;
  orb.days = Math.floor(orb.angle/(Math.PI*2));
  if(orb.days>prevDays){
    setScore(orb.days);
    bgRule=BG_RULES[orb.days%BG_RULES.length];
    curPalette=PALETTES[Math.floor(orb.days/3)%PALETTES.length];
    curMunker=MUNKER_PAIRS[orb.days%MUNKER_PAIRS.length];
  }

  // Spawn asteroids more frequently as days increase
  const spawnRate=Math.max(80,220-orb.days*6);
  if(frame%spawnRate===0) spawnAsteroid();

  // Target lane for current note
  orb.r += (orbitLaneR(orb.lane)-orb.r)*0.18; // smooth lane switch

  const satX=CX+Math.cos(orb.angle)*orb.r;
  const satY=CY+Math.sin(orb.angle)*orb.r;

  // Update asteroids — they orbit at their own speed
  for(let i=orb.asteroids.length-1;i>=0;i--){
    const a=orb.asteroids[i];
    a.angle+=a.speed;
    const ax=CX+Math.cos(a.angle)*a.r;
    const ay=CY+Math.sin(a.angle)*a.r;
    // Collision with satellite
    if(Math.hypot(ax-satX,ay-satY)<ORBIT_SAT_R+a.sz){
      // Knock player — push toward inner lane
      orb.lane=Math.max(0,orb.lane-2);
      impactRips.push({x:satX,y:satY,rad:ORBIT_SAT_R,cs:bgPalShift});
      bgPalShift=(bgPalShift+1)%4;
      // Spawn particles
      for(let p=0;p<8;p++) orb.particles.push({x:ax,y:ay,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:40,hue:HUE[orb.days%12]});
      orb.asteroids.splice(i,1);
      if(orb.lane<0||orb.lane>=ORBIT_LANES) die('KNOCKED OUT OF ORBIT!',`Survived ${orb.days} days`);
      continue;
    }
    // Despawn if lapped
    if(a.angle>orb.angle+Math.PI*3) orb.asteroids.splice(i,1);
  }

  // Particles
  for(let i=orb.particles.length-1;i>=0;i--){
    const p=orb.particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--;
    if(p.life<=0) orb.particles.splice(i,1);
  }

  // HUD
  document.getElementById('h-hint').innerText=`LANE NOTE: ${NOTE[orbitNoteForLane(orb.lane)]} | SPD: ${orb.speed.toFixed(3)}`;
}

function drawOrbit(){
  const satX=CX+Math.cos(orb.angle)*orb.r;
  const satY=CY+Math.sin(orb.angle)*orb.r;
  const hue=lastPC>=0?HUE[lastPC]:175;

  // Draw lane rings
  for(let l=0;l<ORBIT_LANES;l++){
    const r=orbitLaneR(l);
    const note=orbitNoteForLane(l);
    const isActive=l===orb.lane;
    ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);
    ctx.strokeStyle=isActive?`hsl(${HUE[note]},100%,55%)`:`hsl(${HUE[note]},40%,25%)`;
    ctx.lineWidth=isActive?2.5:1;
    if(isActive){ctx.shadowBlur=8;ctx.shadowColor=`hsl(${HUE[note]},100%,55%)`;}
    ctx.stroke();ctx.shadowBlur=0;
    // Note label on ring
    const lx=CX+Math.cos(-Math.PI/6*l)*r;
    const ly=CY+Math.sin(-Math.PI/6*l)*r;
    ctx.fillStyle=isActive?`hsl(${HUE[note]},100%,70%)`:`hsl(${HUE[note]},40%,40%)`;
    ctx.font=`${isActive?13:10}px VT323,monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(NOTE[note],lx,ly);
  }

  // Orbit trail
  for(let i=1;i<=8;i++){
    const ta=orb.angle-i*orb.speed*2;
    const tx=CX+Math.cos(ta)*orb.r,ty=CY+Math.sin(ta)*orb.r;
    ctx.fillStyle=`hsla(${hue},90%,65%,${0.5/i})`;
    ctx.fillRect(tx-2,ty-2,4-Math.floor(i/3),4-Math.floor(i/3));
  }

  // Earth
  pixPlanet(ctx,CX,CY,ORBIT_EARTH_R,'#336633','#66aa66',4);
  ctx.fillStyle='rgba(100,150,255,0.3)';ctx.beginPath();ctx.arc(CX,CY,ORBIT_EARTH_R,0,Math.PI*2);ctx.fill();

  // Asteroids
  orb.asteroids.forEach(a=>{
    const ax=CX+Math.cos(a.angle)*a.r;
    const ay=CY+Math.sin(a.angle)*a.r;
    const lane=a.lane;
    const danger=Math.abs(lane-orb.lane)<=1;
    pixPlanet(ctx,ax,ay,a.sz,'#a0a0a0',danger?'#ff4444':'#dddddd',3);
    if(danger){
      ctx.strokeStyle=`rgba(255,60,60,${0.4+0.3*Math.sin(frame*0.2)})`;
      ctx.lineWidth=2;ctx.beginPath();ctx.arc(ax,ay,a.sz+4,0,Math.PI*2);ctx.stroke();
    }
  });

  // Particles
  orb.particles.forEach(p=>{
    ctx.fillStyle=`hsla(${p.hue},100%,65%,${p.life/40})`;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  });

  // Satellite (player)
  pixPlanet(ctx,satX,satY,ORBIT_SAT_R,`hsl(${hue},70%,60%)`,`hsl(${hue},90%,80%)`,3);

  // Boundary rings
  ctx.save();ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.setLineDash([4,8]);
  ctx.beginPath();ctx.arc(CX,CY,orbitLaneR(0)-4,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,orbitLaneR(ORBIT_LANES-1)+4,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}

function onNoteOrbit(note){
  const lane=orbitLaneForNote(note);
  if(lane>=0){
    orb.lane=lane;
    impactRips.push({x:CX+Math.cos(orb.angle)*orb.r,y:CY+Math.sin(orb.angle)*orb.r,rad:ORBIT_SAT_R,cs:bgPalShift});
    bgPalShift=(bgPalShift+1)%4;
  }
}

// ── SURVIVAL MODE ─────────────────────────────────────────────────────────────
// Orbit a planet. Complete orbit = advance to bigger planet, harder gravity.
// P5 rises (interval=7) push outward, P4 (5) dive, tritone (6) heavy dive.
// Too close = crash. Too far = lost in space. Bigger planets = stronger gravity.

let surv={
  level:1, days:0, oR:0, rV:0, oA:0, oSpd:0.0042,
  grav:0.004, minR:0, maxR:0, satR:16,
  planetR:28, planetHue:120,
  meteors:[], ripples:[],
  prevDays:0,
};

function survMinR(){ return surv.planetR+surv.satR+10; }
function survMaxR(){ return Math.min(CX,CY)-surv.satR-18; }

function resetSurv(){
  surv.level=1; surv.days=0; surv.rV=0; surv.oA=0; surv.oSpd=0.0042; surv.grav=0.004;
  surv.planetR=28; surv.planetHue=120; surv.meteors=[]; surv.ripples=[];
  surv.oR=(survMinR()+survMaxR())/2;
  curPalette=PALETTES[0]; curMunker=MUNKER_PAIRS[0]; bgPalShift=0; bgRule=30;
  document.getElementById('h-scorelabel').innerText='DAYS';
  document.getElementById('h-title').innerText='HARMONIC SURVIVAL';
  document.getElementById('h-title').style.color='#0f0';
  document.getElementById('h-info').innerText='P5↑ RISE | P4/TT↓ DIVE';
}

function advanceLevel(){
  surv.level++;
  surv.planetR=Math.min(60,28+surv.level*8); // planet grows
  surv.grav=0.004+surv.level*0.0018;          // gravity increases
  surv.oSpd+=0.0004;                           // orbit speeds up
  surv.planetHue=(surv.planetHue+40)%360;
  surv.oR=(survMinR()+survMaxR())/2;
  surv.rV=0;
  // CA visual shift
  bgRule=BG_RULES[surv.level%BG_RULES.length];
  curPalette=PALETTES[surv.level%PALETTES.length];
  curMunker=MUNKER_PAIRS[surv.level%MUNKER_PAIRS.length];
  bgPalShift=(bgPalShift+1)%4;
  impactRips.push({x:CX,y:CY,rad:surv.planetR,cs:bgPalShift});
  document.getElementById('h-info').innerText=`LVL ${surv.level} — GRAVITY: ${surv.grav.toFixed(3)}`;
}

function spawnSurvMeteor(){
  const a=Math.random()*Math.PI*2,d=survMaxR()+100;
  const mx=CX+Math.cos(a)*d, my=CY+Math.sin(a)*d;
  const aim=a+Math.PI+(Math.random()-.5)*0.8;
  const spd=1.0+Math.random()*1.2+surv.level*0.2;
  surv.meteors.push({x:mx,y:my,vx:Math.cos(aim)*spd,vy:Math.sin(aim)*spd,sz:6+Math.floor(Math.random()*3)*4,tr:[]});
}

function tickSurv(){
  surv.rV-=surv.grav; surv.rV*=0.995; surv.oR+=surv.rV;
  const prevA=surv.oA; surv.oA+=surv.oSpd;
  // Complete orbit = advance level
  if(Math.floor(prevA/(Math.PI*2))<Math.floor(surv.oA/(Math.PI*2))){
    surv.days++;setScore(surv.days);
    advanceLevel();
  }

  // Meteors
  if(frame%(Math.max(60,140-surv.level*12))===0) spawnSurvMeteor();

  const satX=CX+Math.cos(surv.oA)*surv.oR;
  const satY=CY+Math.sin(surv.oA)*surv.oR;

  for(let i=surv.meteors.length-1;i>=0;i--){
    const m=surv.meteors[i];
    m.tr.unshift({x:m.x,y:m.y}); if(m.tr.length>8)m.tr.pop();
    m.x+=m.vx; m.y+=m.vy;
    if(Math.hypot(m.x-satX,m.y-satY)<surv.satR+m.sz){
      surv.rV-=4+surv.level; // knocked inward harder at higher levels
      impactRips.push({x:satX,y:satY,rad:surv.satR,cs:bgPalShift});
      bgPalShift=(bgPalShift+1)%4;
      surv.meteors.splice(i,1); continue;
    }
    if(Math.hypot(m.x-CX,m.y-CY)>survMaxR()+350) surv.meteors.splice(i,1);
  }

  // Boundaries
  const mn=survMinR(), mx2=survMaxR();
  if(surv.oR<=mn) die('CRASHED INTO PLANET!',`Level ${surv.level} | ${surv.days} orbits`);
  if(surv.oR>=mx2) die('LOST IN DEEP SPACE!',`Level ${surv.level} | ${surv.days} orbits`);

  document.getElementById('h-hint').innerText=`LVL ${surv.level} | RADIUS: ${Math.round(surv.oR)}`;
  document.getElementById('h-phase').innerText=`GRAV: ${surv.grav.toFixed(3)} | VEL: ${surv.rV.toFixed(2)}`;
}

function drawSurv(){
  const hue=lastPC>=0?HUE[lastPC]:surv.planetHue;
  const satX=CX+Math.cos(surv.oA)*surv.oR;
  const satY=CY+Math.sin(surv.oA)*surv.oR;

  // Orbit trail
  for(let i=1;i<=6;i++){
    const ta=surv.oA-i*0.08;
    const tx=CX+Math.cos(ta)*surv.oR,ty=CY+Math.sin(ta)*surv.oR;
    ctx.fillStyle=`hsla(${hue},90%,65%,${0.55/i})`;ctx.fillRect(tx-2,ty-2,4-Math.floor(i/3),4-Math.floor(i/3));
  }

  // Meteors
  surv.meteors.forEach(m=>{
    m.tr.forEach((pt,ti)=>{const a=(1-ti/m.tr.length)*0.7;ctx.fillStyle=`rgba(200,200,200,${a})`;const s=Math.max(1,m.sz*.3*(1-ti/m.tr.length));ctx.fillRect(pt.x,pt.y,s,s);});
    pixPlanet(ctx,m.x,m.y,m.sz,'#a0a0a0','#e0e0e0',3);
  });

  // Boundary rings
  ctx.save();ctx.strokeStyle='rgba(0,255,65,.08)';ctx.lineWidth=1;ctx.setLineDash([4,8]);
  ctx.beginPath();ctx.arc(CX,CY,survMinR()+8,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,survMaxR()-8,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();

  // Planet — gets bigger with level
  pixPlanet(ctx,CX,CY,surv.planetR,`hsl(${surv.planetHue},50%,35%)`,`hsl(${surv.planetHue},70%,55%)`,4);

  // Satellite
  pixPlanet(ctx,satX,satY,surv.satR,`hsl(${hue},70%,60%)`,`hsl(${hue},90%,80%)`,3);

  // P5 hint labels near planet
  if(lastPC>=0){
    const riseNote=(lastPC+7)%12, diveNote=(lastPC+5)%12;
    ctx.font='13px VT323,monospace';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=`hsl(${HUE[riseNote]},100%,65%)`;ctx.fillText(`P5↑ ${NOTE[riseNote]}`,CX+surv.planetR+6,CY-12);
    ctx.fillStyle=`hsl(${HUE[diveNote]},100%,65%)`;ctx.fillText(`P4↓ ${NOTE[diveNote]}`,CX+surv.planetR+6,CY+4);
  }

  // Trajectory preview
  ctx.save();ctx.setLineDash([3,6]);ctx.lineWidth=1.5;
  let sr=surv.oR,sv=surv.rV,sa=surv.oA,px2=satX,py2=satY;
  for(let i=0;i<35;i++){
    sv-=surv.grav;sv*=0.995;sr+=sv;sa+=surv.oSpd;
    const tx=CX+Math.cos(sa)*sr,ty=CY+Math.sin(sa)*sr;
    ctx.strokeStyle=`hsla(${hue},100%,65%,${(1-i/35)*0.45})`;
    ctx.beginPath();ctx.moveTo(px2,py2);ctx.lineTo(tx,ty);ctx.stroke();
    px2=tx;py2=ty;
  }
  ctx.setLineDash([]);ctx.restore();
}

function onNoteSurv(note){
  if(gameState==='IDLE') gameState='PLAYING';
  if(lastPC>=0){
    const diff=(note-lastPC+12)%12;
    if(diff===7){surv.rV+=2.6;surv.oSpd=Math.min(0.016,surv.oSpd+0.0008);}
    else if(diff===5){surv.rV-=2.6;}
    else if(diff===6){surv.rV-=3.2;surv.oSpd=Math.max(0.002,surv.oSpd-0.0005);}
  }
  impactRips.push({x:CX+Math.cos(surv.oA)*surv.oR,y:CY+Math.sin(surv.oA)*surv.oR,rad:surv.satR,cs:bgPalShift});
  bgPalShift=(bgPalShift+1)%4;
}

// ── ECLIPSE MODE ──────────────────────────────────────────────────────────────
// Day/night cycle splits each orbit. 
// NIGHT: P5 intervals are FORBIDDEN (they break orbit) — controls invert.
//        The planet is dark, lanes shift, survival requires P4 instead.
// DAY:   Standard — P5 rises, P4 dives. Normal controls.
// Orbit splits into 8 phases: alternating day/night segments.
// Night gets longer as you survive.

let ecl={
  angle:0, oR:0, rV:0, oSpd:0.0038, grav:0.0035,
  days:0, phase:0,   // 0=day 1=night
  phaseAngle:0,      // angle within current phase
  phaseLen:Math.PI,  // starts at PI (half orbit each), night grows
  nightFrac:0.5,     // fraction of orbit that is night
  ctrlsInverted:false,
  asteroids:[], particles:[],
  forbidden5:false,
  sunAngle:0,        // sun position angle (stays fixed as planet orbits)
};

function eclMinR(){ return 30+14+10; }
function eclMaxR(){ return Math.min(CX,CY)-14-18; }
function eclIsNight(angle){
  // Night = when satellite is in shadow (behind planet relative to sun)
  const diff=((angle-ecl.sunAngle)+Math.PI*2)%(Math.PI*2);
  return diff>Math.PI*(1-ecl.nightFrac) && diff<Math.PI;
}

function resetEcl(){
  ecl.angle=0; ecl.oR=(eclMinR()+eclMaxR())/2; ecl.rV=0; ecl.oSpd=0.0038; ecl.grav=0.0035;
  ecl.days=0; ecl.phaseAngle=0; ecl.nightFrac=0.4; ecl.ctrlsInverted=false;
  ecl.asteroids=[]; ecl.particles=[]; ecl.sunAngle=Math.PI*0.25;
  curPalette=PALETTES[0]; curMunker=MUNKER_PAIRS[0]; bgPalShift=0; bgRule=30;
  document.getElementById('h-scorelabel').innerText='DAYS';
  document.getElementById('h-title').innerText='HARMONIC ECLIPSE';
  document.getElementById('h-title').style.color='#ff8c00';
  document.getElementById('h-info').innerText='DAY: P5 RISE | NIGHT: P4 RISE (INVERTED)';
}

function tickEcl(){
  const prevAngle=ecl.angle;
  ecl.angle+=ecl.oSpd;
  const isNight=eclIsNight(ecl.angle);
  ecl.ctrlsInverted=isNight;

  // Physics — gravity direction inverts at night (in a sense — inward pull becomes push)
  const gravDir=isNight?-0.7:1.0; // night: weak repulsion creates instability
  ecl.rV-=ecl.grav*gravDir;
  ecl.rV*=0.995;
  ecl.oR+=ecl.rV;

  // Day counter
  if(Math.floor(prevAngle/(Math.PI*2))<Math.floor(ecl.angle/(Math.PI*2))){
    ecl.days++;setScore(ecl.days);
    // Night grows longer
    ecl.nightFrac=Math.min(0.75, 0.4+ecl.days*0.02);
    ecl.oSpd=Math.min(0.012,ecl.oSpd+0.0003);
    ecl.grav=Math.min(0.012,ecl.grav+0.0005);
    bgRule=BG_RULES[ecl.days%BG_RULES.length];
    curPalette=PALETTES[Math.floor(ecl.days/4)%PALETTES.length];
    curMunker=MUNKER_PAIRS[ecl.days%MUNKER_PAIRS.length];
  }

  // Asteroid spawning — more in night
  const rate=isNight?90:160;
  if(frame%rate===0){
    const r=eclMinR()+Math.random()*(eclMaxR()-eclMinR());
    const a=ecl.angle+Math.PI*(0.4+Math.random()*0.6)*(Math.random()<.5?1:-1);
    ecl.asteroids.push({r,angle:a,speed:ecl.oSpd*(0.4+Math.random()*0.5),sz:6+Math.floor(Math.random()*4)*3});
  }

  const satX=CX+Math.cos(ecl.angle)*ecl.oR;
  const satY=CY+Math.sin(ecl.angle)*ecl.oR;

  for(let i=ecl.asteroids.length-1;i>=0;i--){
    const a=ecl.asteroids[i]; a.angle+=a.speed;
    const ax=CX+Math.cos(a.angle)*a.r, ay=CY+Math.sin(a.angle)*a.r;
    if(Math.hypot(ax-satX,ay-satY)<14+a.sz){
      ecl.rV+=(isNight?-5:5)*(Math.random()<.5?1:-1);
      impactRips.push({x:satX,y:satY,rad:14,cs:bgPalShift});
      bgPalShift=(bgPalShift+1)%4;
      ecl.asteroids.splice(i,1); continue;
    }
    if(a.angle>ecl.angle+Math.PI*3) ecl.asteroids.splice(i,1);
  }

  const mn=eclMinR(), mx=eclMaxR();
  if(ecl.oR<=mn) die('ECLIPSE CRASH!',`${ecl.days} days | Night fraction: ${Math.round(ecl.nightFrac*100)}%`);
  if(ecl.oR>=mx) die('FLUNG INTO VOID!',`${ecl.days} days | Night fraction: ${Math.round(ecl.nightFrac*100)}%`);

  const phaseStr=isNight?'🌑 NIGHT':'☀ DAY';
  document.getElementById('h-phase').innerText=`${phaseStr} | NIGHT: ${Math.round(ecl.nightFrac*100)}%`;
  document.getElementById('h-hint').innerText=ecl.ctrlsInverted?'⚠ INVERTED — P4=RISE, P5=CRASH!':'P5=RISE | P4=DIVE';
  document.getElementById('h-hint').style.color=ecl.ctrlsInverted?'#ff4444':'#ff8c00';
}

function drawEcl(){
  const isNight=eclIsNight(ecl.angle);
  const hue=lastPC>=0?HUE[lastPC]:30;
  const satX=CX+Math.cos(ecl.angle)*ecl.oR;
  const satY=CY+Math.sin(ecl.angle)*ecl.oR;

  // Night shadow hemisphere
  if(isNight){
    ctx.save();
    const shadowAngle=ecl.sunAngle+Math.PI;
    const grad=ctx.createRadialGradient(CX,CY,0,CX,CY,eclMaxR()+30);
    grad.addColorStop(0,'rgba(0,0,0,0)');
    grad.addColorStop(0.5,'rgba(0,0,30,0.55)');
    grad.addColorStop(1,'rgba(0,0,60,0.75)');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    // Night-side arc
    ctx.beginPath();ctx.arc(CX,CY,eclMaxR()+10,shadowAngle-Math.PI*ecl.nightFrac,shadowAngle+Math.PI*ecl.nightFrac);
    ctx.arc(CX,CY,0,shadowAngle+Math.PI*ecl.nightFrac,shadowAngle-Math.PI*ecl.nightFrac,true);
    ctx.fillStyle='rgba(0,0,30,0.4)';ctx.fill();
    ctx.restore();
  }

  // Sun position indicator
  const sunX=CX+Math.cos(ecl.sunAngle)*(eclMaxR()+40);
  const sunY=CY+Math.sin(ecl.sunAngle)*(eclMaxR()+40);
  ctx.fillStyle=isNight?'rgba(255,200,0,0.2)':'rgba(255,200,0,0.8)';
  for(let a=0;a<Math.PI*2;a+=Math.PI/5){ctx.beginPath();ctx.moveTo(sunX+Math.cos(a)*10,sunY+Math.sin(a)*10);ctx.lineTo(sunX+Math.cos(a-.2)*17,sunY+Math.sin(a-.2)*17);ctx.lineTo(sunX+Math.cos(a+.2)*17,sunY+Math.sin(a+.2)*17);ctx.fill();}
  ctx.fillStyle=isNight?'rgba(255,180,0,0.3)':'rgba(255,220,50,0.9)';
  ctx.beginPath();ctx.arc(sunX,sunY,10,0,Math.PI*2);ctx.fill();

  // Orbit trail — red at night
  for(let i=1;i<=6;i++){
    const ta=ecl.angle-i*ecl.oSpd*2;
    const tx=CX+Math.cos(ta)*ecl.oR, ty=CY+Math.sin(ta)*ecl.oR;
    const trailHue=eclIsNight(ta)?0:hue;
    ctx.fillStyle=`hsla(${trailHue},90%,65%,${0.5/i})`;ctx.fillRect(tx-2,ty-2,4-Math.floor(i/3),4-Math.floor(i/3));
  }

  // Asteroids
  ecl.asteroids.forEach(a=>{
    const ax=CX+Math.cos(a.angle)*a.r, ay=CY+Math.sin(a.angle)*a.r;
    const aIsNight=eclIsNight(a.angle);
    pixPlanet(ctx,ax,ay,a.sz,aIsNight?'#440000':'#a0a0a0',aIsNight?'#ff2222':'#dddddd',3);
  });

  // Boundary rings
  ctx.save();ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.setLineDash([4,8]);
  ctx.beginPath();ctx.arc(CX,CY,eclMinR()+6,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,eclMaxR()-6,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();

  // Planet — half lit half dark
  pixPlanet(ctx,CX,CY,30,'#404060','#8080aa',4);
  // Day side highlight
  ctx.save();ctx.beginPath();ctx.arc(CX,CY,30,ecl.sunAngle-Math.PI/2,ecl.sunAngle+Math.PI/2);
  ctx.arc(CX,CY,0,ecl.sunAngle+Math.PI/2,ecl.sunAngle-Math.PI/2,true);
  ctx.fillStyle='rgba(255,220,100,0.25)';ctx.fill();ctx.restore();

  // Satellite — red tint at night
  const sc=isNight?`hsl(0,80%,55%)`:`hsl(${hue},70%,60%)`;
  const sh=isNight?`hsl(0,100%,75%)`:`hsl(${hue},90%,80%)`;
  pixPlanet(ctx,satX,satY,14,sc,sh,3);

  // Warning flash in night
  if(isNight&&Math.sin(frame*0.25)>0.6){
    ctx.save();ctx.globalAlpha=0.06;ctx.fillStyle='#ff0000';ctx.fillRect(0,0,W,H);ctx.restore();
  }

  // Interval hints
  if(lastPC>=0){
    const riseNote=ecl.ctrlsInverted?(lastPC+5)%12:(lastPC+7)%12;
    const diveNote=ecl.ctrlsInverted?(lastPC+7)%12:(lastPC+5)%12;
    ctx.font='13px VT323,monospace';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=`hsl(${HUE[riseNote]},100%,65%)`;
    ctx.fillText(`RISE→ ${NOTE[riseNote]}`,CX+32,CY-14);
    ctx.fillStyle=`hsl(${HUE[diveNote]},100%,65%)`;
    ctx.fillText(`DIVE→ ${NOTE[diveNote]}`,CX+32,CY+4);
    if(ecl.ctrlsInverted){
      ctx.fillStyle='#ff4444';ctx.font='bold 14px VT323,monospace';
      ctx.textAlign='center';ctx.fillText('⚠ P5 = CRASH ⚠',CX,CY-50);
    }
  }
}

function onNoteEcl(note){
  if(gameState==='IDLE') gameState='PLAYING';
  if(lastPC<0){return;}
  const diff=(note-lastPC+12)%12;
  // Night: controls inverted — P5 is forbidden (sends player inward hard), P4 rises
  if(ecl.ctrlsInverted){
    if(diff===7){ecl.rV-=5; impactRips.push({x:CX,y:CY,rad:30,cs:bgPalShift});} // P5 punished!
    else if(diff===5){ecl.rV+=2.4;} // P4 rises at night
    else if(diff===6){ecl.rV-=1.5;}
  } else {
    if(diff===7){ecl.rV+=2.4;}
    else if(diff===5){ecl.rV-=2.4;}
    else if(diff===6){ecl.rV-=3.0;}
  }
  impactRips.push({x:CX+Math.cos(ecl.angle)*ecl.oR,y:CY+Math.sin(ecl.angle)*ecl.oR,rad:14,cs:bgPalShift});
  bgPalShift=(bgPalShift+1)%4;
}

// ── MODE SWITCHING ────────────────────────────────────────────────────────────
function switchMode(m){
  currentMode=m;
  ['orbit','survival','eclipse'].forEach(id=>{
    document.getElementById('tab-'+id).classList.toggle('active',id.toUpperCase()===m||(id==='survival'&&m==='SURVIVAL'));
  });
  resetGame();
}

function resetGame(){
  gameState='IDLE';score=0;lastPC=-1;cand=-1;candF=0;silF=0;
  impactRips=[];bgPalShift=0;bgRule=30;
  document.getElementById('go').style.display='none';
  document.getElementById('h-score').innerText='0';
  document.getElementById('h-note').innerText='NOTE: --';
  document.getElementById('h-phase').innerText='';
  document.getElementById('h-hint').innerText='';
  if(currentMode==='ORBIT') resetOrbit();
  else if(currentMode==='SURVIVAL') resetSurv();
  else resetEcl();
}

// ── BUTTONS ───────────────────────────────────────────────────────────────────
document.getElementById('b-mic').addEventListener('click',async e=>{
  const ok=await startMic();
  if(ok){e.target.innerText='MIC ON';e.target.style.borderColor='#0ff';e.target.style.color='#0ff';resetGame();if(!loopRunning)loop();}
});

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
let loopRunning=false;
function loop(){
  loopRunning=true;
  requestAnimationFrame(loop);
  frame++;

  // ── Audio gate ─────────────────────────────────────────────────────────
  const raw=readPitch();
  if(raw>=0){
    silF=0;
    if(raw===cand){candF++;if(candF>=NOTE_HOLD&&raw!==lastPC&&gameState!=='DEAD'){
      // Commit note
      document.getElementById('h-note').innerText=`NOTE: ${NOTE[raw]}`;
      const fg=curPalette[(2+bgPalShift)%4];
      const col=`rgb(${fg[0]},${fg[1]},${fg[2]})`;
      document.getElementById('h-box').style.borderColor=col;
      document.getElementById('h-box').style.color=col;
      document.getElementById('h-score').style.color=col;
      // Mode-specific note handler
      if(currentMode==='ORBIT') onNoteOrbit(raw);
      else if(currentMode==='SURVIVAL') onNoteSurv(raw);
      else onNoteEcl(raw);
      // Start game on first note
      if(gameState==='IDLE') gameState='PLAYING';
      lastPC=raw;
    }}
    else{cand=raw;candF=1;}
  } else {
    silF++;if(silF>SIL_RST){lastPC=-1;cand=-1;candF=0;}
  }

  // ── Tick ───────────────────────────────────────────────────────────────
  if(gameState==='PLAYING'){
    if(currentMode==='ORBIT') tickOrbit();
    else if(currentMode==='SURVIVAL') tickSurv();
    else tickEcl();
  }

  // ── CA background ──────────────────────────────────────────────────────
  if(frame%6===0) updateBgCA(lastPC>=0?HUE[lastPC]:180);

  // ── Draw BG ────────────────────────────────────────────────────────────
  ctxBg.fillStyle='#000';ctxBg.fillRect(0,0,W,H);
  ctxBg.imageSmoothingEnabled=false;
  if(rulCv.width>0&&rulCv.height>0) ctxBg.drawImage(rulCv,0,0,W,H);

  // ── Draw game ──────────────────────────────────────────────────────────
  ctx.clearRect(0,0,W,H);
  drawConcentricRings(CX,CY,lastPC>=0?HUE[lastPC]:175);
  drawRipples();

  if(currentMode==='ORBIT') drawOrbit();
  else if(currentMode==='SURVIVAL') drawSurv();
  else drawEcl();

  // Ghost note watermark
  if(lastPC>=0){
    ctx.save();ctx.globalAlpha=0.08;
    ctx.font=`bold ${Math.min(W*0.3,160)}px VT323,monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const fg=curPalette[(2+bgPalShift)%4];
    ctx.fillStyle=`rgb(${fg[0]},${fg[1]},${fg[2]})`;
    ctx.fillText(NOTE[lastPC],W/2,H/2);
    ctx.globalAlpha=1;ctx.restore();
  }

  // IDLE instruction
  if(gameState==='IDLE'&&micOn){
    ctx.save();ctx.globalAlpha=0.7+0.3*Math.sin(frame*0.05);
    ctx.font='bold 20px VT323,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#0ff';ctx.fillText('SING ANY NOTE TO START',W/2,H*0.8);
    ctx.globalAlpha=1;ctx.restore();
  }

  // Munker overlay
  if(frame%2===0) drawFullMunker();
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize(){
  W=window.innerWidth;H=window.innerHeight;CX=W/2;CY=H/2;
  [cBg,cGame,cMk].forEach(c=>{c.width=W;c.height=H;});
  initCA();
  resetGame();
}
window.addEventListener('resize',resize);
resize();
</script>
