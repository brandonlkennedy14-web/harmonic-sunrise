<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
:root{
    --g:#00ff41;--d:#00661a;--bg:#000300;--p:#010a01;
    --glow:0 0 8px #00ff41,0 0 20px rgba(0,255,65,.5);
    --f:'VT323','Courier New',monospace
}
*{box-sizing:border-box;font-family:var(--f)!important;letter-spacing:1px!important}
body{margin:0;padding:0;background:var(--bg)!important;color:var(--g)!important;overflow:hidden;touch-action:manipulation}
canvas{display:block;width:100vw;height:100vh;position:absolute;top:0;left:0;image-rendering:pixelated}
#c-stars{z-index:1}#c-ruliad{z-index:2}#c-game{z-index:3;background:transparent}#c-munker{z-index:4;pointer-events:none}

#nav{
    position:absolute;top:0;left:0;width:100%;z-index:100;
    display:flex;justify-content:center;gap:8px;padding:11px 4px;
    background:rgba(0,3,0,.95);border-bottom:1px solid #003311;
    pointer-events:auto;box-sizing:border-box;flex-wrap:wrap;font-size:12px
}
#nav a{color:var(--g)!important;text-decoration:none;text-shadow:var(--glow)!important}
#nav span{color:#003311}

#ui{
    position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;
    display:flex;flex-direction:column;justify-content:space-between;
    padding:100px 14px 14px;pointer-events:none
}
.hud{display:flex;justify-content:space-between;width:100%;pointer-events:auto}
.title{font-size:22px;color:var(--g)!important;text-shadow:var(--glow)!important;letter-spacing:4px!important}
.hb{
    background:var(--p);padding:6px 10px;border:1px solid var(--d);
    margin-top:6px;font-size:13px;color:var(--g)!important;
    text-shadow:var(--glow)!important;transition:border-color .3s;width:fit-content
}
.sc{font-size:34px;color:var(--g)!important;text-shadow:var(--glow)!important;text-align:right}
.sub{color:#00cc33!important;font-size:11px;margin-top:2px}
.ctrls{display:flex;gap:8px;pointer-events:auto;flex-wrap:wrap;margin-bottom:12px}
button{
    background:var(--p)!important;border:1px solid var(--g)!important;

    padding:8px 13px;font-size:14px;cursor:pointer;
    text-transform:uppercase;letter-spacing:2px!important;border-radius:0!important
}

#go{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    text-align:center;display:none;z-index:20;pointer-events:auto;
    background:#000500!important;padding:32px 44px;
    border:1px solid var(--g)!important;box-shadow:0 0 40px rgba(0,255,65,.25)
}
#go h1{color:var(--g)!important;text-shadow:var(--glow)!important;margin:0 0 8px;font-size:26px;letter-spacing:4px}
#go p{color:#00cc33!important;font-size:15px}

#pa{position:absolute;top:0;left:0;width:100%;height:3px;z-index:15;pointer-events:none;transition:background .5s;opacity:.7}

/* Drag aim line */
#aim-info{
    position:absolute;bottom:110px;left:50%;transform:translateX(-50%);
    font-size:13px;color:var(--g)!important;text-shadow:var(--glow)!important;
    z-index:11;pointer-events:none;opacity:.6;letter-spacing:2px
}

<body>

<div id="nav">

<div id="pa"></div>
<canvas id="c-stars"></canvas>
<canvas id="c-ruliad"></canvas>
<canvas id="c-game"></canvas>
<canvas id="c-munker"></canvas>

<div id="aim-info">DRAG FROM WHITE BALL TO SHOOT</div>

<div id="ui">
    <div class="hud">
        <div>
            <div class="title">HARMONIC WINDING</div>
            <div class="hb" id="hb">
                <div id="snote">NOTE: --</div>
                <div id="sreg">BOUNCES: 0</div>
                <div id="starget" style="color:#ff8c00!important">TARGET: --</div>
                <div id="sinterval" style="color:#ff00ff!important">INTERVAL: --</div>
            </div>
        </div>
        <div style="text-align:right">
            <div class="sub">WINDING</div>
            <div class="sc" id="sc">0</div>
            <div class="sub" style="margin-top:4px">BEST <span id="best">0</span></div>
        </div>
    </div>
    <div class="ctrls">
        <button id="bmic">START MIC</button>
        <button id="bdim" style="border-color:#ff00ff;color:#ff00ff!important">DIM: 1</button>
        <button id="bmode" style="border-color:#00cc33;color:#00cc33!important">MODE: STUDY</button>
    </div>
</div>

<div id="go">
    <h1>UNRAVELLED!</h1>
    <p>Winding: <span id="gf" style="font-size:20px;color:var(--g)!important">0</span></p>
    <p id="gnote" style="font-size:13px;color:#00cc33!important"></p>
    <button id="brst" style="margin-top:12px">REWIND</button>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const NOTE   = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const HUE    = [0,30,55,80,110,145,175,200,230,265,295,330];
const INTERVALS = [
    {name:'Minor 2nd', st:1},  {name:'Major 2nd', st:2},
    {name:'Minor 3rd', st:3},  {name:'Major 3rd', st:4},
    {name:'Perfect 4th', st:5},{name:'Tritone',   st:6},
    {name:'Perfect 5th', st:7},{name:'Minor 6th', st:8},
    {name:'Major 6th', st:9},  {name:'Minor 7th', st:10},
    {name:'Major 7th', st:11}
];

function pc(hz){ if(hz<=0)return -1; let h=Math.round(12*Math.log2(hz/16.35)); return((h%12)+12)%12; }
function lh(a,b,t){ let d=b-a; if(d>180)d-=360; if(d<-180)d+=360; return(a+d*t+360)%360; }
function noteColor(n,s=100,l=55){ return `hsl(${HUE[n]},${s}%,${l}%)`; }

// ── AUDIO ────────────────────────────────────────────────────────────────────
class Mic {
    constructor(){ this.ctx=null; this.an=null; this.isRunning=false; this.buf=null; }
    async start(){
        try{
            this.ctx=new(window.AudioContext||window.webkitAudioContext)();
            const s=await navigator.mediaDevices.getUserMedia({audio:true});
            const src=this.ctx.createMediaStreamSource(s);
            this.an=this.ctx.createAnalyser();
            this.an.fftSize=8192; this.an.smoothingTimeConstant=0.82;
            src.connect(this.an);
            this.buf=new Uint8Array(this.an.frequencyBinCount);
            this.isRunning=true; return true;
        }catch(e){ return false; }
    }
    read(thr=110){
        if(!this.isRunning) return -1;
        this.an.getByteFrequencyData(this.buf);
        const sr=this.ctx.sampleRate, bHz=sr/this.an.fftSize;
        const lo=Math.floor(80/bHz), hi=Math.floor(3000/bHz);
        let maxV=0, maxI=-1;
        for(let i=lo;i<hi&&i<this.buf.length;i++){
            if(this.buf[i]>maxV){maxV=this.buf[i];maxI=i;}
        }
        return maxV>thr ? pc(maxI*bHz) : -1;
    }
    amplitude(){
        if(!this.isRunning) return 0;
        this.an.getByteFrequencyData(this.buf);
        let s=0; for(let i=0;i<32;i++) s+=this.buf[i];
        return s/(32*255);
    }
}
const mic = new Mic();
let micOn = false;

// ── CANVAS ───────────────────────────────────────────────────────────────────
const cS=document.getElementById('c-stars'),   ctxS=cS.getContext('2d');
const cR=document.getElementById('c-ruliad'),  ctxR=cR.getContext('2d');
const cG=document.getElementById('c-game'),    ctx=cG.getContext('2d');
const cM=document.getElementById('c-munker'),  ctxM=cM.getContext('2d');
let W,H;

// ── SHARED VISUALS (ruliad CA + stars + munker — same system as rest of suite) ──
let stars=[], rCells, rNext, rCols, rRows;
const RUL=10;
let mH1=110,mH2=265,mT1=110,mT2=265;
let frame=0;

function initVis(){
    rCols=Math.ceil(W/RUL)+1; rRows=Math.ceil(H/RUL)+1;
    rCells=new Uint8Array(rCols*rRows); rNext=new Uint8Array(rCols*rRows);
    for(let i=0;i<rCells.length;i++) rCells[i]=Math.random()<.32?1:0;
    stars=[];
    for(let i=0;i<260;i++) stars.push({
        x:Math.random()*W,y:Math.random()*H,
        r:Math.random()<.1?2:1,bri:.2+Math.random()*.8,tw:Math.random()*Math.PI*2
    });
}
function stepRuliad(){
    for(let y=0;y<rRows;y++) for(let x=0;x<rCols;x++){
        const i=y*rCols+x; let n=0;
        for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
            if(dx===0&&dy===0)continue;
            n+=rCells[((y+dy+rRows)%rRows)*rCols+(x+dx+rCols)%rCols];
        }
        const a=rCells[i]; rNext[i]=a?((n===2||n===3)?1:0):((n===3||n===6)?1:0);
    }
    let t=rCells;rCells=rNext;rNext=t;
}
function drawStars(p){
    ctxS.fillStyle='#000';ctxS.fillRect(0,0,W,H);
    stars.forEach(s=>{
        const tw=.55+.45*Math.sin(s.tw+frame*.018);
        ctxS.fillStyle=p>=0?`hsla(${HUE[p]},55%,82%,${s.bri*tw*.88})`:`rgba(255,255,255,${s.bri*tw*.85})`;
        ctxS.fillRect(s.x,s.y,s.r,s.r);
    });
}
function drawRuliad(p){
    ctxR.clearRect(0,0,W,H);
    const hue=p>=0?HUE[p]:110;
    for(let y=0;y<rRows;y++) for(let x=0;x<rCols;x++){
        if(rCells[y*rCols+x]){
            ctxR.fillStyle=`hsla(${hue},65%,55%,.14)`;
            ctxR.fillRect(x*RUL,y*RUL,RUL-1,RUL-1);
        }
    }
}
function drawMunker(h1,h2,op=.45){
    ctxM.clearRect(0,0,W,H);
    const S=16;
    for(let y=0;y<H;y++){
        const m=y%S;
        if(m<2)               {ctxM.fillStyle=`hsla(${h1},100%,58%,${op})`;  ctxM.fillRect(0,y,W,1);}
        else if(m>=S/2&&m<S/2+2){ctxM.fillStyle=`hsla(${h2},100%,58%,${op})`;ctxM.fillRect(0,y,W,1);}
        else if(m===3||m===S/2-1){ctxM.fillStyle=`rgba(0,0,0,.5)`;           ctxM.fillRect(0,y,W,1);}
    }
}

// ── GEOMETRY ─────────────────────────────────────────────────────────────────
// Each dimension uses a different polygon count matching music theory
// Dim1=3(triad) Dim2=4(tetrad) Dim3=5(pentatonic) Dim4=6(hexatonic) Dim5=7(heptatonic) Dim6=12(chromatic)
const DIM_SIDES   = [3,4,5,6,7,12];
const DIM_NAMES   = ['TRIAD','TETRAD','PENTA','HEXA','HEPTA','CHROMA'];
let dimension = 0; // index into DIM_SIDES

let tableCX, tableCY, tableR;
let pockets=[]; // {x,y,note,intervalName}
let walls=[];   // {x1,y1,x2,y2,nx,ny} — wall normals for reflection

function buildTable(){
    tableCX = W/2;
    tableCY = H/2 + 20;
    tableR  = Math.min(W,H)*0.36;

    const sides = DIM_SIDES[dimension];
    const rotOffset = -Math.PI/2 + (sides%2===0?Math.PI/sides:0);

    // Vertices
    const verts=[];
    for(let i=0;i<sides;i++){
        const a = rotOffset + (i*2*Math.PI/sides);
        verts.push({ x:tableCX+tableR*Math.cos(a), y:tableCY+tableR*Math.sin(a) });
    }

    // Walls from vertices
    walls=[];
    for(let i=0;i<sides;i++){
        const a=verts[i], b=verts[(i+1)%sides];
        const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy);
        walls.push({ x1:a.x,y1:a.y, x2:b.x,y2:b.y, nx:-dy/len, ny:dx/len });
    }

    // Pockets at each vertex — each assigned a note from the scale
    // The note assigned matches the musical interval of the dimension
    pockets=[];
    for(let i=0;i<sides;i++){
        const noteIdx = (i * Math.floor(12/sides)) % 12;
        pockets.push({ x:verts[i].x, y:verts[i].y, note:noteIdx, r:18 });
    }
}

// ── BALLS ─────────────────────────────────────────────────────────────────────
const BALL_R = 14;
const FRICTION = 0.986;
let balls=[];

function resetBalls(){
    balls=[
        // White (cue ball)
        { x:tableCX, y:tableCY+tableR*0.35, vx:0, vy:0, type:'WHITE',  note:-1, r:BALL_R },
        // Target balls at sub-positions inside table
        { x:tableCX-tableR*.25, y:tableCY-tableR*.2, vx:0, vy:0, type:'TARGET', note:0,  r:BALL_R },
        { x:tableCX+tableR*.25, y:tableCY-tableR*.2, vx:0, vy:0, type:'TARGET', note:0,  r:BALL_R },
        { x:tableCX,            y:tableCY-tableR*.38,vx:0, vy:0, type:'TARGET', note:0,  r:BALL_R },
    ];
    assignTargetNotes();
}

function assignTargetNotes(){
    // Assign a random selection of notes from the current dimension's scale
    const sides=DIM_SIDES[dimension];
    balls.filter(b=>b.type==='TARGET').forEach((b,i)=>{
        const noteIdx = (i * Math.floor(12/sides)) % 12;
        b.note = noteIdx;
    });
}

// ── GAME STATE ────────────────────────────────────────────────────────────────
let gameState   = 'IDLE'; // IDLE PLAYING OVER
let studyMode   = true;   // STUDY shows target note, BLIND hides it
let score       = 0;
let best        = 0;
let bounceCount = 0;
let currentPitch= -1;
let targetNote  = -1;     // which note the player must match with voice to unlock pocket
let sunkNotes   = new Set();
let needsAllSunk = false;

// Drag to shoot
let drag = { active:false, startX:0, startY:0, curX:0, curY:0 };

try{ best=parseInt(localStorage.getItem('windingBest')||'0'); }catch(e){}
document.getElementById('best').innerText=best;

function pickNextTarget(){
    const remaining = balls.filter(b=>b.type==='TARGET'&&!b.sunk);
    if(remaining.length===0){ nextDimension(); return; }
    targetNote = remaining[0].note;
    updateHUD();
}

function updateHUD(){
    const el=document.getElementById('starget');
    if(studyMode){
        el.innerText = targetNote>=0 ? `TARGET: ${NOTE[targetNote]}` : 'TARGET: --';
        el.style.display='block';
    } else {
        el.innerText='TARGET: ???';
    }
    const intSemitones = currentPitch>=0 && targetNote>=0 ? (targetNote-currentPitch+12)%12 : -1;
    const intObj = intSemitones>0 ? INTERVALS.find(iv=>iv.st===intSemitones) : null;
    document.getElementById('sinterval').innerText = intObj ? `INTERVAL: ${intObj.name}` : 'INTERVAL: --';
    document.getElementById('sc').innerText=score;
    document.getElementById('sreg').innerText=`BOUNCES: ${bounceCount}`;
}

function nextDimension(){
    dimension = Math.min(dimension+1, DIM_SIDES.length-1);
    document.getElementById('bdim').innerText=`DIM: ${dimension+1} ${DIM_NAMES[dimension]}`;
    buildTable();
    resetBalls();
    bounceCount=0;
    sunkNotes.clear();
    pickNextTarget();
}

function startGame(){
    score=0; bounceCount=0; dimension=0; sunkNotes.clear();
    document.getElementById('sc').innerText=0;
    document.getElementById('bdim').innerText=`DIM: 1 ${DIM_NAMES[0]}`;
    buildTable();
    resetBalls();
    gameState='PLAYING';
    pickNextTarget();
    document.getElementById('go').style.display='none';
}

function gameOver(){
    gameState='OVER';
    if(score>best){ best=score; try{localStorage.setItem('windingBest',best);}catch(e){} document.getElementById('best').innerText=best; }
    document.getElementById('gf').innerText=score;
    document.getElementById('gnote').innerText=`DIMENSION ${dimension+1} — ${DIM_NAMES[dimension]}`;
    document.getElementById('go').style.display='block';
}

// ── PHYSICS ───────────────────────────────────────────────────────────────────
function reflectBall(b, wall){
    const dot = b.vx*wall.nx + b.vy*wall.ny;
    if(dot>=0) return; // moving away already
    b.vx -= 2*dot*wall.nx;
    b.vy -= 2*dot*wall.ny;
    b.vx *= 0.92; b.vy *= 0.92; // energy loss on bounce
    bounceCount++;
    document.getElementById('sreg').innerText=`BOUNCES: ${bounceCount}`;

    // Bounce audio feedback — flash pitch accent
    if(currentPitch>=0){
        document.getElementById('pa').style.background=
            `hsl(${HUE[currentPitch]},100%,55%)`;
        setTimeout(()=>document.getElementById('pa').style.background='transparent',120);
    }
}

function distToSegment(px,py,ax,ay,bx,by){
    const dx=bx-ax,dy=by-ay,len2=dx*dx+dy*dy;
    if(len2===0)return Math.hypot(px-ax,py-ay);
    const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/len2));
    return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}

function pointSegmentOverlap(bx,by,r,wall){
    return distToSegment(bx,by,wall.x1,wall.y1,wall.x2,wall.y2) < r;
}

function updatePhysics(){
    balls.forEach(b=>{
        if(b.sunk||b.sinking) return;

        // Gravity toward active pocket if note matches voice
        if(currentPitch>=0){
            pockets.forEach(p=>{
                if(p.note===currentPitch||p.note===targetNote){
                    const dx=p.x-b.x,dy=p.y-b.y,dist=Math.hypot(dx,dy);
                    if(dist>0&&dist<tableR*0.4){
                        const pull=0.008*(1-dist/(tableR*0.4));
                        b.vx+=dx/dist*pull*(b.type==='WHITE'?0.3:0.6);
                        b.vy+=dy/dist*pull*(b.type==='WHITE'?0.3:0.6);
                    }
                }
            });
        }

        // Mic amplitude nudges white ball slightly (haptic feel)
        if(b.type==='WHITE'&&micOn){
            const amp=mic.amplitude();
            if(amp>0.15){
                b.vx+=(Math.random()-.5)*amp*0.4;
                b.vy+=(Math.random()-.5)*amp*0.4;
            }
        }

        b.vx*=FRICTION; b.vy*=FRICTION;
        if(Math.hypot(b.vx,b.vy)<0.01){b.vx=0;b.vy=0;}

        // Sub-step integration
        const steps=3;
        for(let s=0;s<steps;s++){
            b.x+=b.vx/steps; b.y+=b.vy/steps;

            // Wall collisions
            walls.forEach(w=>{
                if(pointSegmentOverlap(b.x,b.y,b.r+2,w)){
                    reflectBall(b,w);
                    // Push ball back out
                    const dist=distToSegment(b.x,b.y,w.x1,w.y1,w.x2,w.y2);
                    const push=b.r+2-dist;
                    b.x+=w.nx*push; b.y+=w.ny*push;
                }
            });

            // Pocket collision
            pockets.forEach(p=>{
                const dist=Math.hypot(b.x-p.x,b.y-p.y);
                if(dist<p.r+b.r*0.5){
                    sinkBall(b,p);
                }
            });
        }

        // Ball-ball collisions
        balls.forEach(b2=>{
            if(b===b2||b.sunk||b2.sunk) return;
            const dx=b2.x-b.x,dy=b2.y-b.y;
            const dist=Math.hypot(dx,dy);
            const minD=b.r+b2.r;
            if(dist<minD&&dist>0.01){
                const overlap=minD-dist;
                const nx=dx/dist,ny=dy/dist;
                b.x-=nx*overlap/2; b.y-=ny*overlap/2;
                b2.x+=nx*overlap/2; b2.y+=ny*overlap/2;
                const kx=b.vx-b2.vx,ky=b.vy-b2.vy,p2=nx*kx+ny*ky;
                if(p2>0){
                    b.vx-=p2*nx; b.vy-=p2*ny;
                    b2.vx+=p2*nx; b2.vy+=p2*ny;
                }
            }
        });
    });
}

function sinkBall(b,pocket){
    if(b.sinking||b.sunk) return;
    b.sinking=true;

    if(b.type==='WHITE'){
        // Cue ball sunk — respawn
        setTimeout(()=>{
            b.sinking=false;
            b.x=tableCX; b.y=tableCY+tableR*0.35;
            b.vx=0; b.vy=0;
        },600);
        return;
    }

    // TARGET ball — only scores if voice matches the pocket note
    const pocketNoteMatch = currentPitch>=0 && currentPitch===pocket.note;
    const targetMatch     = b.note===pocket.note;

    if(targetMatch && (pocketNoteMatch||gameState==='PLAYING')){
        // Check if player is singing correct note (study requirement in BLIND mode)
        if(!studyMode && currentPitch>=0 && currentPitch!==targetNote){
            // Blind mode strict — must be singing the right note
            b.sinking=false; return;
        }
        b.sunk=true;
        score+=10+bounceCount;
        sunkNotes.add(b.note);
        document.getElementById('sc').innerText=score;
        // Visual flash
        mT1=HUE[pocket.note]; mT2=HUE[(pocket.note+7)%12];
        document.getElementById('pa').style.background=noteColor(pocket.note);
        setTimeout(()=>document.getElementById('pa').style.background='transparent',300);
        // Pick next
        setTimeout(pickNextTarget,400);
    } else {
        b.sinking=false;
    }
}

// ── DRAW TABLE ────────────────────────────────────────────────────────────────
function drawTable(){
    const sides=DIM_SIDES[dimension];

    // Table felt — faint polygon fill
    ctx.beginPath();
    const rotOffset=-Math.PI/2+(sides%2===0?Math.PI/sides:0);
    for(let i=0;i<sides;i++){
        const a=rotOffset+(i*2*Math.PI/sides);
        const x=tableCX+tableR*Math.cos(a), y=tableCY+tableR*Math.sin(a);
        if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();

    // Felt colour changes with pitch
    const hue=currentPitch>=0?HUE[currentPitch]:110;
    ctx.fillStyle=`hsla(${hue},30%,8%,0.9)`;
    ctx.fill();

    // Wall lines — coloured per note
    walls.forEach((w,i)=>{
        const n=pockets[i].note;
        ctx.strokeStyle=currentPitch===n?`hsl(${HUE[n]},100%,65%)`:`hsl(${HUE[n]},60%,35%)`;
        ctx.lineWidth=currentPitch===n?3:1.5;
        ctx.shadowBlur=currentPitch===n?8:0;
        ctx.shadowColor=noteColor(n);
        ctx.beginPath();ctx.moveTo(w.x1,w.y1);ctx.lineTo(w.x2,w.y2);ctx.stroke();
        ctx.shadowBlur=0;
    });

    // Pockets — circles at vertices with note labels
    pockets.forEach((p,i)=>{
        const isTarget = p.note===targetNote;
        const isSinging= p.note===currentPitch;
        const r = isTarget?(16+Math.sin(frame*.1)*3):14;

        // Pocket hole
        ctx.fillStyle='#000';
        ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();

        // Ring
        ctx.strokeStyle=isSinging?`hsl(${HUE[p.note]},100%,70%)`
                        :isTarget?`hsl(${HUE[p.note]},80%,55%)`
                                 :`hsl(${HUE[p.note]},40%,30%)`;
        ctx.lineWidth=isSinging?3:isTarget?2:1;
        ctx.shadowBlur=isSinging?12:isTarget?6:0;
        ctx.shadowColor=noteColor(p.note);
        ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.stroke();
        ctx.shadowBlur=0;

        // Note label
        ctx.fillStyle=isSinging?`hsl(${HUE[p.note]},100%,80%)`
                      :isTarget?`hsl(${HUE[p.note]},70%,65%)`
                               :`hsl(${HUE[p.note]},40%,40%)`;
        ctx.font=`bold ${isTarget?13:11}px VT323,monospace`;
        ctx.textAlign='center';ctx.textBaseline='middle';

        const label = (!studyMode&&p.note===targetNote) ? '?' : NOTE[p.note];
        ctx.fillText(label,p.x,p.y);
    });
}

// ── DRAW BALLS ────────────────────────────────────────────────────────────────
function drawBalls(){
    balls.forEach(b=>{
        if(b.sunk) return;
        const alpha=b.sinking?0.4:1.0;

        // Shadow
        ctx.globalAlpha=alpha*0.5;
        ctx.fillStyle='rgba(0,0,0,0.6)';
        ctx.beginPath();ctx.arc(b.x+3,b.y+3,b.r,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=alpha;

        // Ball fill
        if(b.type==='WHITE'){
            ctx.fillStyle='#eee';
        } else {
            const hue=HUE[b.note];
            ctx.fillStyle=`hsl(${hue},70%,45%)`;
        }
        ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();

        // Specular highlight
        ctx.fillStyle='rgba(255,255,255,0.5)';
        ctx.beginPath();ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.35,0,Math.PI*2);ctx.fill();

        // Note label on coloured balls
        if(b.type==='TARGET'){
            const label=(!studyMode&&b.note===targetNote)?'?':NOTE[b.note];
            ctx.fillStyle='#fff';
            ctx.font='bold 10px VT323,monospace';
            ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.fillText(label,b.x,b.y+1);
        }

        ctx.globalAlpha=1;
    });
}

// ── DRAW DRAG AIM LINE ────────────────────────────────────────────────────────
function drawAimLine(){
    if(!drag.active) return;
    const wb=balls.find(b=>b.type==='WHITE');
    if(!wb) return;
    const dx=wb.x-drag.curX, dy=wb.y-drag.curY;
    const len=Math.hypot(dx,dy);
    if(len<5) return;

    // Dashed power line
    ctx.save();
    ctx.strokeStyle=`rgba(0,255,65,${Math.min(1,len/200)})`;
    ctx.lineWidth=1.5;
    ctx.setLineDash([6,6]);
    ctx.shadowBlur=6;ctx.shadowColor='#00ff41';
    ctx.beginPath();ctx.moveTo(wb.x,wb.y);ctx.lineTo(drag.curX,drag.curY);ctx.stroke();

    // Arrow head in launch direction
    const nx=dx/len,ny=dy/len;
    const ax=wb.x+nx*40,ay=wb.y+ny*40;
    ctx.setLineDash([]);
    ctx.strokeStyle='rgba(0,255,65,0.9)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(wb.x,wb.y);ctx.lineTo(ax,ay);ctx.stroke();
    ctx.restore();

    // Power indicator
    const pct=Math.min(1,len/300);
    ctx.fillStyle=`rgba(0,255,65,${0.7*pct})`;
    ctx.font='12px VT323,monospace';
    ctx.textAlign='center';
    ctx.fillText(`PWR ${Math.round(pct*100)}%`,wb.x,wb.y-25);
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function getPos(e){
    const r=cG.getBoundingClientRect();
    const cl=e.touches?e.touches[0]:e;
    return{x:(cl.clientX-r.left)*(W/r.width),y:(cl.clientY-r.top)*(H/r.height)};
}

function onDown(e){
    if(gameState!=='PLAYING') return;
    const pos=getPos(e);
    const wb=balls.find(b=>b.type==='WHITE'&&!b.sinking);
    if(!wb) return;
    if(Math.hypot(pos.x-wb.x,pos.y-wb.y)<wb.r*3){
        drag.active=true; drag.startX=wb.x; drag.startY=wb.y;
        drag.curX=pos.x; drag.curY=pos.y;
    }
}
function onMove(e){
    if(!drag.active) return;
    e.preventDefault();
    const pos=getPos(e);
    drag.curX=pos.x; drag.curY=pos.y;
}
function onUp(e){
    if(!drag.active) return;
    drag.active=false;
    const wb=balls.find(b=>b.type==='WHITE'&&!b.sinking);
    if(!wb) return;
    const dx=drag.startX-drag.curX, dy=drag.startY-drag.curY;
    const len=Math.hypot(dx,dy);
    if(len>8){
        const power=Math.min(len/300,1);
        wb.vx=(dx/len)*power*22;
        wb.vy=(dy/len)*power*22;
    }
}

cG.addEventListener('mousedown',onDown);
window.addEventListener('mousemove',onMove);
window.addEventListener('mouseup',onUp);
cG.addEventListener('touchstart',onDown,{passive:true});
cG.addEventListener('touchmove',onMove,{passive:false});
cG.addEventListener('touchend',onUp);

// ── BUTTONS ───────────────────────────────────────────────────────────────────
document.getElementById('bmic').addEventListener('click',async e=>{
    const ok=await mic.start();
    if(ok){
        micOn=true;
        e.target.innerText='MIC ON';
        e.target.style.borderColor='#00ff41';
        if(gameState==='IDLE') startGame();
    }
});

document.getElementById('bdim').addEventListener('click',()=>{
    if(gameState==='PLAYING') nextDimension();
});

document.getElementById('bmode').addEventListener('click',()=>{
    studyMode=!studyMode;
    const btn=document.getElementById('bmode');
    btn.innerText=`MODE: ${studyMode?'STUDY':'BLIND'}`;
    btn.style.borderColor=studyMode?'#00cc33':'#ff00ff';
    btn.style.color=studyMode?'#00cc33':'#ff00ff';
    updateHUD();
});

document.getElementById('brst').addEventListener('click',startGame);

// ── NOTE STABILITY GATE ───────────────────────────────────────────────────────
let candPc=-1, candF=0;
const HOLD=3; // frames to hold before registering note

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize(){
    W=window.innerWidth; H=window.innerHeight;
    [cS,cR,cG,cM].forEach(c=>{c.width=W;c.height=H;});
    buildTable();
    if(gameState==='PLAYING') resetBalls();
    initVis();
}
window.addEventListener('resize',resize);

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(){
    requestAnimationFrame(loop);
    frame++;

    // Smooth Munker hue
    mH1=lh(mH1,mT1,.05); mH2=lh(mH2,mT2,.05);

    // Background layers
    if(frame%4===0) stepRuliad();
    drawRuliad(currentPitch);
    if(frame%3===0) drawStars(currentPitch);
    ctx.clearRect(0,0,W,H);
    if(frame%2===0) drawMunker(mH1,mH2);

    // ── Mic pitch reading ──────────────────────────────────────────────────
    if(micOn&&gameState==='PLAYING'){
        const raw=mic.read(110);
        if(raw>=0){
            if(raw===candPc) candF++;
            else{candPc=raw;candF=1;}
            if(candF>=HOLD){
                currentPitch=raw;
                mT1=HUE[raw]; mT2=HUE[(raw+7)%12];
                document.getElementById('pa').style.background=
                    `linear-gradient(90deg,hsl(${mT1},100%,55%),hsl(${mT2},100%,55%))`;
                document.getElementById('hb').style.borderColor=noteColor(raw,70,55);
                document.getElementById('snote').innerText=`NOTE: ${NOTE[raw]}`;
                updateHUD();
            }
        } else {
            candF=0;
            currentPitch=-1;
            document.getElementById('pa').style.background='transparent';
        }
    }

    // ── Physics ──────────────────────────────────────────────────────────
    if(gameState==='PLAYING') updatePhysics();

    // ── Draw ─────────────────────────────────────────────────────────────
    drawTable();
    drawAimLine();
    drawBalls();

    // Dimension label watermark
    ctx.fillStyle='rgba(0,255,65,0.06)';
    ctx.font=`bold ${Math.min(W,H)*0.25}px VT323,monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(DIM_NAMES[dimension],W/2,H/2);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
resize();
buildTable();
loop();
</script>
