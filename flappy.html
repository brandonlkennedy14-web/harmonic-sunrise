<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Sunrise</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;overflow:hidden;touch-action:manipulation;font-family:'VT323','Courier New',monospace}
canvas{display:block;position:absolute;top:0;left:0;width:100vw;height:100vh;image-rendering:pixelated}
#c-bg{z-index:1}#c-game{z-index:2;background:transparent}#c-munker{z-index:3;pointer-events:none}
#nav{position:absolute;top:0;left:0;width:100%;z-index:100;display:flex;justify-content:center;gap:8px;padding:11px 4px;background:rgba(0,0,0,.92);border-bottom:2px solid #111;pointer-events:auto;flex-wrap:wrap;font-size:12px;letter-spacing:1px}
#nav a{text-decoration:none;font-weight:bold}#nav span{color:#333}
.hud{position:absolute;top:55px;left:0;width:100%;z-index:50;display:flex;justify-content:space-between;padding:6px 10px;pointer-events:none;font-size:13px;letter-spacing:1px;text-shadow:2px 2px 0 #000}
.hbox{background:rgba(0,0,0,.75);padding:5px 9px;border:1px solid currentColor;font-size:12px;width:fit-content}
.sc{font-size:34px;text-align:right}
.ctrls{position:absolute;bottom:0;left:0;width:100%;z-index:50;display:flex;gap:8px;padding:10px;flex-wrap:wrap;background:rgba(0,0,0,.7);pointer-events:auto;padding-bottom:max(10px,env(safe-area-inset-bottom,0px))}
button{background:rgba(0,0,0,.8);border:1px solid #0ff;color:#0ff;padding:8px 12px;font-size:14px;cursor:pointer;letter-spacing:2px;font-family:'VT323',monospace;text-transform:uppercase}
#go{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none;z-index:200;pointer-events:auto;background:#000;padding:28px 40px;border:2px solid #0ff;box-shadow:0 0 40px rgba(0,255,255,.25);font-family:'VT323',monospace}
#go h1{font-size:26px;letter-spacing:4px;margin-bottom:8px;color:#0ff}
#go p{font-size:15px;color:#0f0;margin-bottom:4px}
/* Pipe zone labels */
#zones{position:absolute;right:4px;top:0;height:100%;z-index:9;pointer-events:none;display:flex;flex-direction:column;justify-content:space-around;padding:55px 0 55px}
.zl{font-size:11px;color:#aaa;text-align:right;letter-spacing:1px;opacity:.4}
</style>
</head>
<body>
<div id="nav">
  <a href="index.html"  style="color:#ff8c00">[1]SUNRISE</a><span>|</span>
  <a href="flappy.html" style="color:#00ffcc">[2]FLAPPY</a><span>|</span>
  <a href="billiards.html" style="color:#ff00ff">[3]WINDING</a><span>|</span>
  <a href="invaders.html" style="color:#ff0055">[4]INVADERS</a><span>|</span>
  <a href="weaver.html" style="color:#b366ff">[5]WEAVER</a><span>|</span>
  <a href="simon.html"  style="color:#fff">[6]SIMON</a>
</div>
<canvas id="c-bg"></canvas>
<canvas id="c-game"></canvas>
<canvas id="c-munker"></canvas>
<div id="zones">
  <div class="zl">HIGH</div>
  <div class="zl">MID</div>
  <div class="zl">BASS</div>
</div>
<div class="hud">
  <div>
    <div id="h-title" style="font-size:20px;letter-spacing:4px;color:#0ff;text-shadow:0 0 8px #0ff">FLAPPY SUNRISE</div>
    <div class="hbox" id="h-box" style="color:#0ff;margin-top:4px">
      <div id="h-note">NOTE: --</div>
      <div id="h-reg">ZONE: --</div>
      <div id="h-target" style="color:#ff8c00;display:none">TARGET: --</div>
      <div id="h-bonus" style="color:#ffcc00;display:none">--</div>
    </div>
  </div>
  <div>
    <div style="font-size:11px;color:#aaa;text-align:right">SCORE</div>
    <div class="sc" id="h-score" style="color:#0ff">0</div>
    <div style="font-size:11px;color:#555;text-align:right">BEST <span id="h-best">0</span></div>
  </div>
</div>
<div class="ctrls">
  <button id="b-mic">START MIC</button>
  <button id="b-mode" style="border-color:#f0f;color:#f0f">MODE: EASY</button>
</div>
<div id="go">
  <h1>CRASHED!</h1>
  <p>Score: <span id="go-score" style="font-size:20px">0</span></p>
  <button onclick="reset()" style="margin-top:12px;border-color:#0ff;color:#0ff">PLAY AGAIN</button>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const NOTE=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const HUE=[0,30,55,80,110,145,175,200,230,265,295,330];
const PALETTES=[
  [[0,255,255],[255,0,255],[255,255,0],[0,0,255]],
  [[0,255,0],[128,0,128],[0,128,255],[255,165,0]],
  [[255,0,100],[0,255,100],[100,0,255],[255,255,255]],
  [[255,50,0],[0,255,200],[200,0,255],[255,255,0]]
];
const MUNKER_PAIRS=[['#00FFFF','#FF00FF'],['#800080','#00FF00'],['#0000FF','#FFFF00'],['#FF0000','#0000FF']];
const BG_RULES=[30,90,110,150,105,73,22,126];
const CA_PX=12, B_CA=48;  // larger pixels = fewer cells = no freeze

// Registers = vertical lanes
const REGS=[
  {lo:80, hi:300, label:'BASS', hue:30,  zone:2}, // bottom third
  {lo:300,hi:900, label:'MID',  hue:175, zone:1}, // middle
  {lo:900,hi:3000,label:'HIGH', hue:200, zone:0}  // top third
];

// Physics — real flappy feel with diagonal component
const GRAV      = 0.32;   // pulls down each frame
const FLAP_VY   = -5.5;   // upward component on flap (reduced from original -8.5)
const FLAP_VX   = 1.8;    // forward diagonal push
const VCAP      = 10;
const DRAG      = 0.995;  // forward momentum drag

// Pipe dimensions
const PW        = 52;
const GAP       = 185;    // gap height
const PIPE_SPD  = 2.8;
const PIPE_INT  = 120;    // frames between spawns

// Smoothing
const NOTE_HOLD = 3;      // frames stable before note commits
const SIL_RST   = 25;

// ── RETRO RULIAD RENDERER ─────────────────────────────────────────────────────
const cBg   = document.getElementById('c-bg'),   ctxBg  = cBg.getContext('2d');
const cGame = document.getElementById('c-game'), ctx    = cGame.getContext('2d');
const cMk   = document.getElementById('c-munker'),ctxMk = cMk.getContext('2d');

const rulCv = document.createElement('canvas'), rCtx = rulCv.getContext('2d');
const boardCv= document.createElement('canvas'),bCtx = boardCv.getContext('2d');
boardCv.width = B_CA; boardCv.height = B_CA;

let bData     = new Uint8Array(B_CA*B_CA);
let bDataNext = new Uint8Array(B_CA*B_CA);

let W,H,frame=0;
let CA_W=1,CA_H=1,caData,bgRowColors;
let curPalette  = PALETTES[0];
let curMunker   = MUNKER_PAIRS[0];
let bgPalShift  = 0;
let bgRule      = 30;
let curRule     = 0;
let impactRips  = [];
let palCycle    = 0; // increases with score, cycles palette

function initCA(){
  CA_W=Math.max(1,Math.ceil(W/CA_PX));
  CA_H=Math.max(1,Math.ceil(H/CA_PX));
  rulCv.width=CA_W; rulCv.height=CA_H;
  caData=new Uint8Array(CA_W*CA_H);
  bgRowColors=new Uint8Array(CA_H);
  caData[Math.floor(CA_W/2)]=1;
}

function updateBgCA(){
  if(CA_W<=0||CA_H<=0)return;
  let prev=new Uint8Array(CA_W);
  for(let x=0;x<CA_W;x++) prev[x]=caData[(CA_H>1?1:0)*CA_W+x];
  for(let y=CA_H-1;y>0;y--){
    for(let x=0;x<CA_W;x++) caData[y*CA_W+x]=caData[(y-1)*CA_W+x];
    bgRowColors[y]=bgRowColors[y-1];
  }
  bgRowColors[0]=bgPalShift;
  const ar=bgRule;
  for(let x=0;x<CA_W;x++){
    const l=prev[x===0?CA_W-1:x-1]?4:0;
    const c=prev[x]?2:0;
    const r=prev[x===CA_W-1?0:x+1]?1:0;
    caData[x]=(ar&(1<<(l+c+r)))?1:0;
  }
  // inject bird position into CA
  const bix=Math.floor((bird.x/W)*CA_W);
  if(bix>=0&&bix<CA_W) caData[bix]=1;

  const img=rCtx.createImageData(CA_W,CA_H);
  for(let y=0;y<CA_H;y++){
    const rs=bgRowColors[y]||0;
    const bg=curPalette[(0+rs)%4], fg=curPalette[(2+rs)%4];
    for(let x=0;x<CA_W;x++){
      const i=y*CA_W+x, idx=i*4;
      if(caData[i]){
        img.data[idx]=fg[0];img.data[idx+1]=fg[1];img.data[idx+2]=fg[2];img.data[idx+3]=255;
      } else {
        img.data[idx]=Math.floor(bg[0]*.15);img.data[idx+1]=Math.floor(bg[1]*.15);img.data[idx+2]=Math.floor(bg[2]*.15);img.data[idx+3]=255;
      }
    }
  }
  rCtx.putImageData(img,0,0);
}

function updatePipeCA(px,topH,botY){
  // Inject pipe walls into board CA so the CA reacts to obstacles
  const t=Math.floor(frame/3), scale=1+(score%3)*0.5;
  const img=bCtx.createImageData(B_CA,B_CA);
  for(let y=0;y<B_CA;y++) for(let x=0;x<B_CA;x++){
    const i=y*B_CA+x, prev=bData[i];
    const sx=Math.floor((x-B_CA/2)/scale), sy=Math.floor((y-B_CA/2)/scale);
    const rm=curRule%8;
    let v=0;
    if(rm===0)v=(sx^sy)^prev; else if(rm===1)v=(sx&sy)^(prev*2);
    else if(rm===2)v=(sx|sy)^prev; else if(rm===3)v=Math.floor(Math.sqrt(sx*sx+sy*sy))^prev;
    else if(rm===4)v=(sx*sx^sy*sy)%Math.max(1,prev); else if(rm===5)v=(sx*prev)^(sy*prev);
    else if(rm===6)v=(sx+sy)^(sx-sy)^prev; else v=Math.abs(sx^sy)*2^prev;
    const val=Math.abs(v-t*3); bDataNext[i]=val%256;
    const cs=Math.floor(frame/15), ci=(Math.floor(bDataNext[i]/64)+cs)%4, c=curPalette[ci];
    const idx=i*4;
    img.data[idx]=c[0];img.data[idx+1]=c[1];img.data[idx+2]=c[2];img.data[idx+3]=255;
  }
  for(let i=0;i<B_CA*B_CA;i++) bData[i]=bDataNext[i];
  bCtx.putImageData(img,0,0);
}

function drawConcentricRings(){
  const maxR=Math.max(W,H)*0.7, numR=16;
  ctx.save();
  for(let i=0;i<numR;i++){
    const t=((frame*0.45+i*(maxR/numR))%maxR);
    const alpha=0.1+0.14*(1-t/maxR);
    const c=curPalette[i%4];
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(bird.x, H*0.88, t, 0, Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}

function drawRipples(){
  if(impactRips.length>6)impactRips.length=6;
  ctx.save();ctx.globalCompositeOperation='color-dodge';
  for(let i=impactRips.length-1;i>=0;i--){
    const r=impactRips[i]; r.rad+=10;
    const c=curPalette[(2+r.cs)%4];
    const alpha=Math.max(0,1-(r.rad/(Math.max(W,H)*0.7)));
    ctx.beginPath();ctx.arc(r.x,r.y,r.rad,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${alpha*0.7})`;
    ctx.lineWidth=20;ctx.stroke();
    if(alpha<=0) impactRips.splice(i,1);
  }
  ctx.restore();
}

let munkerCV=null,munkerPair=['',''];
function rebuildMunker(){
  if(!munkerCV)munkerCV=document.createElement('canvas');
  munkerCV.width=4;munkerCV.height=12;
  const mc=munkerCV.getContext('2d');
  function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
  mc.clearRect(0,0,4,12);
  mc.fillStyle=hexToRgba(curMunker[0],0.32);mc.fillRect(0,0,4,2);
  mc.fillStyle=hexToRgba(curMunker[1],0.32);mc.fillRect(0,6,4,2);
  munkerPair=[...curMunker];
}
function drawFullMunker(){
  if(munkerPair[0]!==curMunker[0]||munkerPair[1]!==curMunker[1]||!munkerCV)rebuildMunker();
  const pat=ctxMk.createPattern(munkerCV,'repeat');
  ctxMk.clearRect(0,0,W,H);
  ctxMk.fillStyle=pat;ctxMk.fillRect(0,0,W,H);
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let audioCtx,analyser,dataArray,micOn=false,audioLevel=0;
let lastPC=-1,lastReg=null,cand=null,candF=0,silF=0;

async function startMic(){
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=8192; analyser.smoothingTimeConstant=0.75;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    dataArray=new Uint8Array(analyser.frequencyBinCount);
    micOn=true; return true;
  }catch(e){return false;}
}

function readMic(){
  if(!micOn||!dataArray) return null;
  analyser.getByteFrequencyData(dataArray);
  const sr=audioCtx.sampleRate, bHz=sr/analyser.fftSize;
  let best=null;
  for(const reg of REGS){
    const lo=Math.floor(reg.lo/bHz), hi=Math.min(Math.floor(reg.hi/bHz),dataArray.length-1);
    let mx=0,mi=-1;
    for(let i=lo;i<=hi;i++) if(dataArray[i]>mx){mx=dataArray[i];mi=i;}
    if(mx>108&&(!best||mx>best.amp)) best={hz:mi*bHz,amp:mx,reg};
  }
  if(!best) return null;
  let h=Math.round(12*Math.log2(best.hz/16.35));
  best.pc=((h%12)+12)%12;
  // audio level for CA distortion
  let s=0; for(let i=0;i<64;i++) s+=dataArray[i];
  audioLevel=s/(64*255)*100;
  return best;
}

// ── GAME STATE ────────────────────────────────────────────────────────────────
let score=0,best=0,over=false,mode='EASY';
let tgtNote=-1,bonusTimer=0,bonusTxt='',lastZone=-1,swTimer=0;
try{best=parseInt(localStorage.getItem('flappyBest2')||'0');}catch(e){}
document.getElementById('h-best').innerText=best;

// ── BIRD ──────────────────────────────────────────────────────────────────────
const BR=16;
let bird={x:0,y:0,vx:2.8,vy:0,trail:[]};
let birdHue=175;

function resetBird(){
  bird.x=W*0.18; bird.y=H/2; bird.vx=2.8; bird.vy=0; bird.trail=[];
}

// ── PIPES ─────────────────────────────────────────────────────────────────────
let pipes=[];

// Real Flappy Bird level design — predefined gap patterns with gradually increasing difficulty
// gap = {zone:0|1|2, gapCY} where zone maps to vertical region
// Levels: easy zigzag → medium alternating → hard compressed → chaos
function nextPipePattern(){
  const spd = PIPE_SPD + score*0.035;
  const gapH = Math.max(130, GAP - score*1.2); // gap shrinks with score
  const zoneH = H/3;

  // Pick gap centre based on musical zone — player must read the zone
  let zone;
  if(score<5){
    // Tutorial: always mid, just get used to it
    zone=1;
  } else if(score<12){
    // Zigzag: alternate top and bottom
    zone = (pipes.length%2===0) ? 2 : 0;
  } else if(score<20){
    // Flappy classic: mostly mid with occasional high/low
    zone = [1,1,0,1,2,1][pipes.length%6];
  } else if(score<35){
    // Alternating with no mid
    zone = pipes.length%2===0 ? 0 : 2;
  } else {
    // Random chaos
    zone = Math.floor(Math.random()*3);
  }

  // Gap centre Y with some randomness within zone
  const jitter = (zoneH*0.3)*(Math.random()-0.5);
  const gapCY = (zone+0.5)*zoneH + jitter;
  const clampedGapCY = Math.max(gapH/2+20, Math.min(H-gapH/2-20, gapCY));

  return { x:W+PW, gapCY:clampedGapCY, gapH, zone, speed:spd, passed:false,
           topH:clampedGapCY-gapH/2, botY:clampedGapCY+gapH/2 };
}

function drawPixelPipe(p){
  // Draw pipe with CA texture inside — same as Retro Ruliad board
  const c=curPalette[(2+bgPalShift)%4];
  const c2=curPalette[(1+bgPalShift)%4];

  // Top pipe
  if(p.topH>0){
    ctx.save();
    ctx.beginPath();ctx.rect(p.x,0,PW,p.topH);ctx.clip();
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(boardCv,p.x,0,PW,p.topH);
    // Munker stripes inside pipe
    for(let y=0;y<p.topH;y+=12){
      ctx.fillStyle=curMunker[0];ctx.globalAlpha=0.3;ctx.fillRect(p.x,y,PW,3);
      ctx.fillStyle=curMunker[1];ctx.globalAlpha=0.3;ctx.fillRect(p.x,y+6,PW,3);
    }
    ctx.globalAlpha=1;
    // Pipe outline
    ctx.strokeStyle=`rgb(${c[0]},${c[1]},${c[2]})`;ctx.lineWidth=2;
    ctx.strokeRect(p.x,0,PW,p.topH);
    // End cap
    ctx.fillStyle=`rgb(${c2[0]},${c2[1]},${c2[2]})`;ctx.fillRect(p.x-4,p.topH-8,PW+8,8);
    ctx.restore();
  }

  // Bottom pipe
  if(p.botY<H){
    ctx.save();
    ctx.beginPath();ctx.rect(p.x,p.botY,PW,H-p.botY);ctx.clip();
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(boardCv,p.x,p.botY,PW,H-p.botY);
    for(let y=p.botY;y<H;y+=12){
      ctx.fillStyle=curMunker[0];ctx.globalAlpha=0.3;ctx.fillRect(p.x,y,PW,3);
      ctx.fillStyle=curMunker[1];ctx.globalAlpha=0.3;ctx.fillRect(p.x,y+6,PW,3);
    }
    ctx.globalAlpha=1;
    ctx.strokeStyle=`rgb(${c[0]},${c[1]},${c[2]})`;ctx.lineWidth=2;
    ctx.strokeRect(p.x,p.botY,PW,H-p.botY);
    ctx.fillStyle=`rgb(${c2[0]},${c2[1]},${c2[2]})`;ctx.fillRect(p.x-4,p.botY,PW+8,8);
    ctx.restore();
  }

  // Zone label in gap
  const regLabel=p.zone===0?'HIGH':p.zone===1?'MID':'BASS';
  const regHue=REGS[2-p.zone].hue;
  ctx.fillStyle=`hsl(${regHue},100%,65%)`;
  ctx.font='bold 13px VT323,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(regLabel,p.x+PW/2,p.gapCY);

  // Ripple ring at gap entrance
  if(Math.abs(p.x-bird.x)<80&&!p.passed){
    const fg=curPalette[(2+bgPalShift)%4];
    const alpha=(1-Math.abs(p.x-bird.x)/80)*0.4;
    ctx.strokeStyle=`rgba(${fg[0]},${fg[1]},${fg[2]},${alpha})`;
    ctx.lineWidth=2;ctx.beginPath();
    ctx.arc(p.x+PW/2,p.gapCY,GAP/2*0.7,0,Math.PI*2);ctx.stroke();
  }
}

// ── BIRD DRAW ─────────────────────────────────────────────────────────────────
function drawBird(){
  // Trail
  bird.trail.push({x:bird.x,y:bird.y,hue:birdHue});
  if(bird.trail.length>10) bird.trail.shift();
  bird.trail.forEach((t,i)=>{
    const a=(i/bird.trail.length)*0.4;
    ctx.fillStyle=`hsla(${t.hue},100%,60%,${a})`;
    const r=BR*(i/bird.trail.length)*0.7;
    ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.fill();
  });

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.beginPath();ctx.arc(bird.x+3,bird.y+3,BR,0,Math.PI*2);ctx.fill();

  // Body — grey, Munker makes it look coloured
  ctx.fillStyle='#bbb';
  ctx.beginPath();ctx.arc(bird.x,bird.y,BR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath();ctx.arc(bird.x-BR*.3,bird.y-BR*.3,BR*.35,0,Math.PI*2);ctx.fill();

  // Eye
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(bird.x+BR*.3,bird.y-BR*.15,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(bird.x+BR*.3+1,bird.y-BR*.15-1,1,0,Math.PI*2);ctx.fill();

  // Wing flap — tilts based on vy
  const tilt=Math.atan2(bird.vy,bird.vx*2);
  ctx.save();ctx.translate(bird.x,bird.y);ctx.rotate(tilt);
  ctx.fillStyle='rgba(200,200,200,0.8)';
  ctx.beginPath();ctx.ellipse(-BR*.2,BR*.3,BR*.6,BR*.25,-0.5,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Note label
  if(lastPC>=0){
    const fg=curPalette[(2+bgPalShift)%4];
    ctx.fillStyle=`rgb(${fg[0]},${fg[1]},${fg[2]})`;
    ctx.font=`bold 14px VT323,monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(NOTE[lastPC],bird.x,bird.y);
  }
}

// ── ON NOTE ───────────────────────────────────────────────────────────────────
function onNote(peak){
  const pc=peak.pc, reg=peak.reg;
  lastPC=pc; lastReg=reg;
  birdHue=HUE[pc];

  // Munker + palette shift
  const pi=Math.floor(score/8)%PALETTES.length;
  curPalette=PALETTES[pi];
  curMunker=MUNKER_PAIRS[pi%MUNKER_PAIRS.length];
  bgPalShift=(bgPalShift+1)%4;
  impactRips.push({x:bird.x,y:bird.y,rad:BR,cs:bgPalShift});

  // DIAGONAL flap — zone determines vertical target + forward push
  const zoneH=H/3;
  const targetY=(reg.zone+0.5)*zoneH;
  const dy=targetY-bird.y;

  // Horizontal velocity boost (diagonal feel)
  bird.vx=Math.min(bird.vx+FLAP_VX, 6.5);

  if(mode==='EASY'){
    // Smooth guidance toward target zone
    bird.vy += (dy>0?1:-1)*Math.min(Math.abs(dy)*0.04,5);
    bird.vy += FLAP_VY*0.35; // softer vertical
    bird.vy *= 0.75;
  } else {
    // Hard: note must match zone target
    const nextPipe=pipes.find(p=>!p.passed&&p.x>bird.x-PW);
    if(nextPipe){
      const wantZone=nextPipe.zone;
      const wantReg=REGS[2-wantZone];
      if(reg.zone===wantZone||tgtNote===pc){
        // Correct zone hit — diagonal flap toward gap
        const gapY=nextPipe.gapCY;
        const dgy=gapY-bird.y;
        bird.vy=FLAP_VY + (dgy>0?1.2:-0.5);
        bird.vx=Math.min(bird.vx+FLAP_VX*1.2,7);
        tgtNote=(pc+7)%12;
        document.getElementById('h-target').innerText=`NEXT: ${NOTE[tgtNote]}`;
      } else {
        // Wrong zone — partial flap
        bird.vy+=FLAP_VY*0.5;
      }
    }
  }

  // Zone switch bonus
  if(lastZone>=0&&swTimer<50){
    if(Math.abs(reg.zone-lastZone)===2){
      score+=3;bonusTxt='FULL CROSS +3';bonusTimer=55;
    } else if(Math.abs(reg.zone-lastZone)===1){
      score+=1;bonusTxt='SWITCH +1';bonusTimer=35;
    }
    document.getElementById('h-score').innerText=score;
  }
  lastZone=reg.zone; swTimer=0;

  // Rule change with score milestones
  if(score%10===0&&score>0){
    bgRule=BG_RULES[Math.floor(score/10)%BG_RULES.length];
    curRule=(curRule+1)%8;
  }

  // HUD
  const fg=curPalette[(2+bgPalShift)%4];
  const col=`rgb(${fg[0]},${fg[1]},${fg[2]})`;
  document.getElementById('h-box').style.borderColor=col;
  document.getElementById('h-box').style.color=col;
  document.getElementById('h-score').style.color=col;
  document.getElementById('h-note').innerText=`NOTE: ${NOTE[pc]}`;
  document.getElementById('h-reg').innerText=`ZONE: ${reg.label}`;
}

// ── GAME LOGIC ────────────────────────────────────────────────────────────────
function checkCollision(){
  for(const p of pipes){
    if(bird.x+BR>p.x&&bird.x-BR<p.x+PW){
      if(bird.y-BR<p.topH||bird.y+BR>p.botY) return true;
    }
  }
  return bird.y-BR<=0||bird.y+BR>=H;
}

function gameOver(){
  if(over)return; over=true;
  if(score>best){best=score;try{localStorage.setItem('flappyBest2',best);}catch(e){}document.getElementById('h-best').innerText=best;}
  document.getElementById('go-score').innerText=score;
  document.getElementById('go').style.display='block';
}

function reset(){
  score=0;over=false;pipes=[];frame=0;lastPC=-1;lastReg=null;
  cand=null;candF=0;silF=0;tgtNote=-1;lastZone=-1;swTimer=0;
  bonusTimer=0;bonusTxt='';birdHue=175;
  impactRips=[];bgPalShift=0;curPalette=PALETTES[0];curMunker=MUNKER_PAIRS[0];
  bgRule=30;curRule=0;bData.fill(0);bDataNext.fill(0);
  for(let i=0;i<caData.length;i++) caData[i]=Math.random()<0.35?1:0;
  caData[Math.floor(CA_W/2)]=1;
  resetBird();
  document.getElementById('h-score').innerText='0';
  document.getElementById('h-note').innerText='NOTE: --';
  document.getElementById('h-reg').innerText='ZONE: --';
  document.getElementById('go').style.display='none';
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize(){
  W=window.innerWidth;H=window.innerHeight;
  [cBg,cGame,cMk].forEach(c=>{c.width=W;c.height=H;});
  initCA();
  resetBird();
}
window.addEventListener('resize',resize);

// ── BUTTONS ───────────────────────────────────────────────────────────────────
document.getElementById('b-mic').addEventListener('click',async e=>{
  const ok=await startMic();
  if(ok){e.target.innerText='MIC ON';e.target.style.borderColor='#0ff';e.target.style.color='#0ff';reset();loop();}
});
document.getElementById('b-mode').addEventListener('click',e=>{
  mode=mode==='EASY'?'HARD':'EASY';
  e.target.innerText=`MODE: ${mode}`;
  e.target.style.borderColor=mode==='HARD'?'#ff0':'#f0f';
  e.target.style.color=mode==='HARD'?'#ff0':'#f0f';
  document.getElementById('h-target').style.display=mode==='HARD'?'block':'none';
  reset();
});

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(){
  if(!micOn)return;
  requestAnimationFrame(loop);
  frame++;
  swTimer++;

  // ── Audio gate ──────────────────────────────────────────────────────────
  const raw=readMic();
  if(raw&&raw.pc>=0){
    silF=0;
    if(cand&&raw.pc===cand.pc&&raw.reg===cand.reg){
      candF++;
      if(candF>=NOTE_HOLD&&(raw.pc!==lastPC||raw.reg!==lastReg)) onNote(raw);
    } else { cand=raw; candF=1; }
  } else {
    silF++;
    if(silF>SIL_RST){ lastPC=-1; lastReg=null; cand=null; candF=0; }
  }

  if(over) return;

  // ── Physics ─────────────────────────────────────────────────────────────
  bird.vy += GRAV;
  bird.vy  = Math.max(-VCAP, Math.min(VCAP, bird.vy));
  bird.vx *= DRAG;
  bird.vx  = Math.max(2.2, bird.vx); // minimum forward speed
  bird.y  += bird.vy;
  bird.x  += bird.vx * 0.15; // slight forward drift (tiny — mostly pipes scroll)

  // ── Pipes ───────────────────────────────────────────────────────────────
  if(frame%PIPE_INT===0) pipes.push(nextPipePattern());
  for(let i=pipes.length-1;i>=0;i--){
    const p=pipes[i];
    p.x-=p.speed;
    if(!p.passed&&p.x+PW<bird.x){
      p.passed=true;
      score++;
      document.getElementById('h-score').innerText=score;
      bgPalShift=(bgPalShift+1)%4;
      impactRips.push({x:bird.x,y:bird.y,rad:BR*2,cs:bgPalShift});
    }
    if(p.x+PW<0) pipes.splice(i,1);
  }

  if(checkCollision()) gameOver();

  // ── CA background ───────────────────────────────────────────────────────
  if(frame%6===0) updateBgCA();
  if(frame%3===0) updatePipeCA();

  // ── Draw BG ─────────────────────────────────────────────────────────────
  ctxBg.fillStyle='#000';ctxBg.fillRect(0,0,W,H);
  ctxBg.imageSmoothingEnabled=false;
  if(rulCv.width>0&&rulCv.height>0) ctxBg.drawImage(rulCv,0,0,W,H);

  // ── Draw Game ───────────────────────────────────────────────────────────
  ctx.clearRect(0,0,W,H);

  drawConcentricRings();
  drawRipples();

  // Zone divider lines
  ctx.save();ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.setLineDash([6,12]);
  [H/3,2*H/3].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();});
  ctx.setLineDash([]);ctx.restore();

  // Next pipe zone highlight
  const nextP=pipes.find(p=>!p.passed&&p.x>bird.x-PW);
  if(nextP){
    const zoneH=H/3;
    const fg=curPalette[(2+bgPalShift)%4];
    ctx.fillStyle=`rgba(${fg[0]},${fg[1]},${fg[2]},0.04)`;
    ctx.fillRect(0,nextP.zone*zoneH,W,zoneH);
  }

  // Update board CA texture once per loop cycle (not per pipe)
  if(frame%8===0) updatePipeCA();
  // Draw pipes
  pipes.forEach(p=>drawPixelPipe(p));

  drawBird();

  // Big ghost note watermark
  if(lastPC>=0){
    ctx.save();ctx.globalAlpha=0.1;
    ctx.font=`bold ${Math.min(W*0.3,160)}px VT323,monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const fg=curPalette[(2+bgPalShift)%4];
    ctx.fillStyle=`rgb(${fg[0]},${fg[1]},${fg[2]})`;
    ctx.fillText(NOTE[lastPC],W/2,H/2);
    ctx.globalAlpha=1;
    ctx.restore();
  }

  // Bonus flash
  if(bonusTimer>0){
    bonusTimer--;
    const a=bonusTimer/55;
    ctx.save();ctx.globalAlpha=a;
    ctx.font='bold 28px VT323,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#ffcc00';ctx.shadowBlur=14;ctx.shadowColor='#ffcc00';
    ctx.fillText(bonusTxt,W/2,H/2-70);
    ctx.restore();
  }

  // ── Munker overlay ──────────────────────────────────────────────────────
  if(frame%2===0) drawFullMunker();
}

resize();
</script>
